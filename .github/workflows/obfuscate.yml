name: Deploy to main-obf

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Checkout main-obf
        uses: actions/checkout@v4
        with:
          ref: main-obf
          path: main-obf-branch
          token: ${{ secrets.BB_PAT }}

      - name: Copy files to main-obf
        run: |
          rsync -av --exclude='.git' --exclude='.github' --exclude='main-obf-branch' ./ main-obf-branch/

      - name: Commit and push to main-obf
        run: |
          cd main-obf-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios, nada que hacer."
          else
            git commit -m "chore: sync from dev [skip ci]"
            git push origin main-obf
            echo "Push a main-obf exitoso"
          fi
