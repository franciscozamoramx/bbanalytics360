    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }
        
        body {
            background: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        html {
            background: linear-gradient(135deg, #0f1e4a 0%, #152c6e 100%);
            min-height: 100%;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            max-width: 250px;
            margin: 0 auto 20px;
            display: block;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            color: white;
        }
        
        .title-highlight {
            color: #FFD700;
            font-weight: bold;
        }
        
        .version {
            font-size: 14px;
            color: #FFD700;
            font-weight: normal;
            vertical-align: super;
            margin-left: 5px;
            opacity: 0.8;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(to bottom, #FFD700, #FF8C00);
            color: #152c6e;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to bottom, #FFE600, #FF9E00);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s 1s infinite;
        }
        @keyframes shimmer {
            0%        { left: -100%; }
            40%, 100% { left: 150%; }
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            text-align: left;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            outline: none;
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .form-group .field-icon {
            position: absolute;
            left: 13px;
            bottom: 13px;
            width: 18px;
            height: 18px;
            opacity: 0.4;
            transition: opacity 0.3s, filter 0.3s;
            pointer-events: none;
        }

        .form-group:focus-within .field-icon {
            opacity: 1;
            filter: drop-shadow(0 0 4px #FFD700);
        }

        .login-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.45), transparent);
            transform: scaleX(0);
            animation: divExpand 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
            transform-origin: center;
        }

        @keyframes divExpand {
            to { transform: scaleX(1); }
        }
        
        .user-info {
            margin-top: 15px;
            font-size: 14px;
            color: #FFD700;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);
            color: #90EE90;
        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #FFB6C1;
        }
        
        .status-loading {
            background: rgba(255, 255, 0, 0.2);
            color: #FFD700;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            p {
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
