                            box-shadow: 0 4px 20px rgba(255,215,0,0.25);
                        }

                        .slide-cta:hover {
                            transform: translateY(-2px);
                            box-shadow: 0 8px 28px rgba(255,215,0,0.4);
                        }

                        .carrusel-slide-description { display: none; }

                        .carrusel-nav {
                            position: absolute;
                            top: 50%;
                            transform: translateY(-50%);
                            background: rgba(255,255,255,0.08);
                            border: 1px solid rgba(255,255,255,0.15);
                            color: white;
                            width: clamp(36px, 3vw, 48px);
                            height: clamp(36px, 3vw, 48px);
                            border-radius: 50%;
                            cursor: pointer;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            font-size: clamp(13px, 1.2vw, 18px);
                            z-index: 15;
                            transition: background 0.2s, transform 0.2s;
                        }

                        .carrusel-nav:hover {
                            background: rgba(255,215,0,0.2);
                            border-color: rgba(255,215,0,0.4);
                            transform: translateY(-50%) scale(1.08);
                        }

                        .carrusel-prev { left: 14px; }
                        .carrusel-next { right: 14px; }

                        .carrusel-indicators {
                            position: absolute;
                            bottom: 14px;
                            left: 0; right: 0;
                            display: flex;
                            justify-content: center;
                            gap: 6px;
                            z-index: 15;
                        }

                        .carrusel-indicator {
                            width: 6px; height: 6px;
                            background: rgba(255,255,255,0.25);
                            border-radius: 50%;
                            cursor: pointer;
                            transition: background 0.3s, width 0.3s;
                        }

                        .carrusel-indicator.active {
                            background: #FFD700;
                            width: 20px;
                            border-radius: 3px;
                        }

                        .preview-images, .preview-prev, .preview-next { display: none; }
                        .carrusel-dashboard-badge { display: none; }

                        .slide-counter {
                            position: absolute;
                            top: 16px; right: 18px;
                            font-size: clamp(11px, 0.9vw, 13px);
                            color: rgba(255,255,255,0.3);
                            z-index: 15;
                            font-variant-numeric: tabular-nums;
                        }
                        
                        iframe {
                            width: 100%;
                            height: 100%;
                            border: none;
                            transition: opacity 0.3s;
                        }
                        
                        /* Estilo para el mensaje de menú deshabilitado */
                        .context-menu-message {
                            position: fixed;
                            top: 10px;
                            right: 10px;
                            background: rgba(0,0,0,0.7);
                            color: white;
                            padding: 10px;
                            border-radius: 5px;
                            z-index: 10000;
                            font-size: 14px;
                            display: none;
                            animation: fadeInOut 3s ease-in-out;
                        }
                        
                        @keyframes fadeInOut {
                            0% { opacity: 0; }
                            10% { opacity: 1; }
                            90% { opacity: 1; }
                            100% { opacity: 0; }
                        }

                        /* Loading spinner para iframe */
                        .iframe-loading {
                            position: absolute;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            text-align: center;
                            z-index: 100;
                            display: none;
                        }

                        .spinner {
                            border: 4px solid #f3f3f3;
                            border-top: 4px solid #152c6e;
                            border-radius: 50%;
                            width: 40px;
                            height: 40px;
                            animation: spin 1s linear infinite;
                            margin: 0 auto 15px;
                        }

                        @keyframes spin {
                            0% { transform: rotate(0deg); }
                            100% { transform: rotate(360deg); }
                        }
                    </style>
                </head>
                <body>
                    <div class="context-menu-message" id="contextMenuMessage">Menú contextual deshabilitado</div>
                    <div class="container">
                        <!-- Botón hamburguesa superior izquierda -->
                        <button class="floating-toggle" id="toggleBtn">
                            <i class="fas fa-bars"></i>
                        </button>
                        
                        <!-- Overlay para cerrar menú -->
                        <div class="sidebar-overlay" id="overlay"></div>
                        
                        <!-- Sidebar con menú -->
                        <div class="sidebar" id="sidebar">
                            <div class="sidebar-header">
                                <img src="./icon_crystal.png" alt="Big Bola Casinos" class="sidebar-logo">
                                <div class="sidebar-title">
                                    <div>BB Analytics 360 <span style="font-size: 12px; color: #FFD700; margin-left: 5px;">V1.81</span></div>
                                    <div class="sidebar-subtitle">Plataforma de Business Intelligence</div>
                                </div>
                                <div class="user-info">
                                    Usuario: ${currentUser}<br>
                                    Dashboards: ${currentUserPermissions.filter(d => d !== 'principal').length} disponibles
                                </div>
                            </div>
                            ${menuItemsHTML}
                            <div class="sidebar-footer">
                                <button class="exit-btn" id="exitBtn">
                                    <i class="fas fa-sign-out-alt"></i> Salir
                                </button>
                            </div>
                        </div>
                        
                        <!-- Contenedor principal -->
                        <div class="iframe-container" id="iframeContainer">
                            <div class="iframe-loading" id="iframeLoading">
                                <div class="spinner"></div>
                                <p>Cargando dashboard...</p>
                            </div>
                            <div id="contentContainer" class="carrusel-container">
                                <div class="carrusel-header">
                                    <h1 class="carrusel-title">BB <span>Analytics 360</span> <span style="font-size: 14px; font-weight: 400; color: rgba(255,215,0,0.7); margin-left: 6px;">V1.81</span></h1>
                                    <div class="carrusel-permission-info" id="carruselPermissionInfo">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" style="width:13px;height:13px;fill:#FFD700;vertical-align:middle;margin-right:4px;"><path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3zm339-78.7c9.4-9.4 9.4-24.6 0-33.9l-48-48c-9.4-9.4-24.6-9.4-33.9 0l-80 80c-9.4 9.4-9.4 24.6 0 33.9l48 48c9.4 9.4 24.6 9.4 33.9 0l80-80z"/></svg> Cargando información de usuario...
                                    </div>
                                </div>
                                <div class="carrusel-slider" id="carruselSlider">
                                    <div style="text-align: center; padding: 40px; color: white; display:flex; align-items:center; justify-content:center; height:100%; flex-direction:column; gap:16px;">
                                        <div class="spinner" style="margin: 0 auto;"></div>
                                        <p style="color:rgba(255,255,255,0.5); font-size:14px;">Cargando dashboards...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <script>
                        // 🔧 VARIABLES GLOBALES PARA ESTE SCRIPT
                        const dashboardUrls = ${dashboardUrlsJson};
                        const dashboardNames = ${dashboardNamesJson};
                        const dashboardIcons = ${dashboardIconsJson};
                        const dashboardImages = ${dashboardImagesJson};
                        const dashboardDescriptions = ${dashboardDescriptionsJson};
                        const currentUser = "${currentUser}";
                        const currentUserPermissions = ${currentUserPermissionsJson};
                        const currentSessionId = "${currentSessionId}";
                        
                        // Mini logger para la ventana de dashboard
                        const SUPABASE_URL = 'https://sjljxynqpsyrhjefevdp.supabase.co';
                        const SUPABASE_KEY = 'sb_publishable_LpBbCf9gaDgQa7Bmn6c6QQ_a2sYf5y7';
                        window.bbLogger = {
                            log: function(action, dashboard, user, extra) {
                                try {
                                    fetch(SUPABASE_URL + '/rest/v1/logs', {
                                        method: 'POST',
                                        headers: {
                                            'apikey': SUPABASE_KEY,
                                            'Authorization': 'Bearer ' + SUPABASE_KEY,
                                            'Content-Type': 'application/json',
                                            'Prefer': 'return=minimal'
                                        },
                                        body: JSON.stringify({
                                            Usuario: user || currentUser,
                                            Accion: action,
                                            Dashboard: dashboard || '',
                                            DashboardName: (typeof dashboardNames !== 'undefined' && dashboardNames[dashboard]) || '',
                                            Dispositivo: 'desktop',
                                            IP: 'IP no disponible',
                                            UserAgent: navigator.userAgent.substring(0, 300),
                                            SesionID: currentSessionId
                                        })
                                    }).catch(function(e) { console.warn('Log error:', e); });
                                } catch(e) { console.warn('Log error:', e); }
                            }
                        };
                        // Variables para control del carrusel
                        let currentSlide = 0;
                        let autoPlayInterval;
                        let isAutoPlay = true;
                        let carruselData = [];
                        
                        // Variable global para controlar logout
                        window.logoutRegistered = false;
                        
                        // 🔧 FUNCIÓN PARA GENERAR LOS DATOS DEL CARRUSEL
                        function generateCarruselData() {
                            const data = [];
                            
                            // Para cada dashboard permitido, crear una diapositiva
                            currentUserPermissions.forEach(dashboardKey => {
                                if (dashboardKey !== 'diccionario' && dashboardUrls[dashboardKey]) {
                                    const imageUrl = dashboardImages[dashboardKey] || 'https://i.postimg.cc/QCN4dPG1/analisis-de-datos.png';
                                    const description = dashboardDescriptions[dashboardKey] || 'Dashboard de Business Intelligence';
                                    
                                    data.push({
                                        key: dashboardKey,
                                        title: dashboardNames[dashboardKey],
                                        image: imageUrl,
                                        description: description,
                                        icon: dashboardIcons[dashboardKey],
                                        url: dashboardUrls[dashboardKey]
                                    });
                                }
                            });
                            
                            return data;
                        }
                        
                        // 🔧 FUNCIÓN PARA INICIALIZAR EL CARRUSEL
                        function initCarrusel() {
                            carruselData = generateCarruselData();
                            
                            // Actualizar información de permisos
                            const permissionInfo = document.getElementById('carruselPermissionInfo');
                            if (permissionInfo) {
                                permissionInfo.innerHTML = \`
                                    <i class="fas fa-user-check"></i> Usuario: \${currentUser} | 
                                    <i class="fas fa-chart-bar"></i> Dashboards disponibles: \${currentUserPermissions.filter(d => d !== 'principal').length}
                                \`;
                            }
                            
                            // Si no hay dashboards permitidos, mostrar mensaje
                            if (carruselData.length === 0) {
                                document.getElementById('contentContainer').innerHTML = \`
                                    <div style="text-align: center; color: white; padding: 40px;">
                                        <i class="fas fa-exclamation-triangle" style="font-size: 60px; margin-bottom: 20px; color: #FFD700;"></i>
                                        <h2 style="font-size: 28px; margin-bottom: 15px;">No hay dashboards disponibles</h2>
                                        <p style="font-size: 18px;">No tienes permisos para acceder a ningún dashboard.</p>
                                        <p style="font-size: 16px; margin-top: 20px; color: #FFD700;">
                                            Contacta al administrador para solicitar acceso.
                                        </p>
                                    </div>
                                \`;
                                return;
                            }
                            
                            // Mapeo de áreas por dashboard key
                            const areaLabels = {
                                adt:'Máquinas', desempeno:'Máquinas', rtp:'Máquinas', aforo:'Máquinas',
                                auditoria:'Auditoría', seguimiento_auditores:'Auditoría', promociones:'Auditoría',
                                bigplayers:'Comercial', bolipoits:'Comercial', clientes:'Comercial',
                                ingreso_tarjetas:'Finanzas',
                                ingresos_canal:'Finanzas',
                                ventas:'Finanzas',
                                inventario:'TI', proyectos:'TI', oficina_proyectos:'TI', logs_bi:'TI',
                                incidencias_cat:'Operaciones',
                                principal:'Inicio'
                            };

                            // Ícono por área (coincide con los del menú lateral)
                            const areaIcons = {
                                'Máquinas': 'fas fa-chart-line',
                                'Auditoría': 'fas fa-search',
                                'Comercial': 'fas fa-gem',
                                'Finanzas': 'fas fa-credit-card',
                                'TI': 'fas fa-desktop',
                                'Operaciones': 'fas fa-headset',
                                'Inicio': 'fas fa-home'
                            };

                            // Generar HTML del carrusel - layout 2 columnas
                            const slidesHTML = carruselData.map((slide, index) => \`
                                <div class="carrusel-slide \${index === 0 ? 'active' : ''}" data-index="\${index}">
                                    <div class="slide-image-panel">
                                        <img src="\${slide.image}" alt="\${slide.title}" data-key="\${slide.key}">
                                    </div>
                                    <div class="slide-info-panel">
                                        <span class="slide-area-badge">
                                            <i class="\${areaIcons[areaLabels[slide.key]] || slide.icon}" style="font-size:10px;"></i>
                                            \${areaLabels[slide.key] || 'Dashboard'}
                                        </span>
                                        <div class="dashboard-title">\${slide.title}</div>
                                        <div class="dashboard-desc">\${slide.description}</div>
                                        <button class="slide-cta" data-key="\${slide.key}">
                                            <i class="fas fa-arrow-right" style="font-size:12px;"></i>
                                            Abrir dashboard
                                        </button>
                                    </div>
                                </div>
                            \`).join('');

                            const indicatorsHTML = carruselData.map((_, index) => \`
                                <div class="carrusel-indicator \${index === 0 ? 'active' : ''}" data-index="\${index}"></div>
                            \`).join('');

                            document.getElementById('carruselSlider').innerHTML = \`
                                <button class="carrusel-nav carrusel-prev">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button class="carrusel-nav carrusel-next">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                                \${slidesHTML}
                                <div class="carrusel-indicators">
                                    \${indicatorsHTML}
                                </div>
                                <span class="slide-counter" id="slideCounter">1 / \${carruselData.length}</span>
                            \`;
                            
                            // Crear imágenes de preview (anterior y siguiente)
                            createPreviewImages();
                            
                            // Inicializar eventos del carrusel
                            setupCarruselEvents();
                            startAutoPlay();
                            
                            // Actualizar imágenes de preview
                            updatePreviewImages();
                        }
                        
                        // 🔧 FUNCIÓN PARA CREAR IMÁGENES DE PREVIO/SIGUIENTE
                        function createPreviewImages() {
                            const carruselSlider = document.getElementById('carruselSlider');
                            
                            // Crear imagen para dashboard anterior
                            const previewPrev = document.createElement('img');
                            previewPrev.className = 'preview-images preview-prev';
                            previewPrev.alt = 'Dashboard anterior';
                            
                            // Crear imagen para dashboard siguiente
                            const previewNext = document.createElement('img');
                            previewNext.className = 'preview-images preview-next';
                            previewNext.alt = 'Dashboard siguiente';
                            
                            // Agregar al carrusel
                            carruselSlider.appendChild(previewPrev);
                            carruselSlider.appendChild(previewNext);
                        }
                        
                        // 🔧 FUNCIÓN PARA ACTUALIZAR IMÁGENES DE PREVIO/SIGUIENTE
                        function updatePreviewImages() {
                            const previewPrev = document.querySelector('.preview-prev');
                            const previewNext = document.querySelector('.preview-next');
                            
                            if (!previewPrev || !previewNext || carruselData.length === 0) return;
                            
                            // Calcular índices de anterior y siguiente
                            const prevIndex = (currentSlide - 1 + carruselData.length) % carruselData.length;
                            const nextIndex = (currentSlide + 1) % carruselData.length;
                            
                            // Actualizar imágenes
                            if (carruselData[prevIndex]) {
                                previewPrev.src = carruselData[prevIndex].image;
                                previewPrev.style.opacity = '0.6';
                            }
                            
                            if (carruselData[nextIndex]) {
                                previewNext.src = carruselData[nextIndex].image;
                                previewNext.style.opacity = '0.6';
                            }
                        }
                        
                        // 🔧 FUNCIÓN PARA CONFIGURAR EVENTOS DEL CARRUSEL
                        function setupCarruselEvents() {
                            const prevBtn = document.querySelector('.carrusel-prev');
                            const nextBtn = document.querySelector('.carrusel-next');
                            const indicators = document.querySelectorAll('.carrusel-indicator');
                            const slideImages = document.querySelectorAll('.carrusel-slide img');
                            
                            if (prevBtn) prevBtn.addEventListener('click', showPrevSlide);
                            if (nextBtn) nextBtn.addEventListener('click', showNextSlide);
                            
                            indicators.forEach(indicator => {
                                indicator.addEventListener('click', function() {
                                    const index = parseInt(this.getAttribute('data-index'));
                                    goToSlide(index);
                                });
                            });
                            
                            // Click en imagen
                            slideImages.forEach(img => {
                                img.addEventListener('click', function() {
                                    const dashboardKey = this.getAttribute('data-key');
                                    if (dashboardKey && dashboardUrls[dashboardKey]) {
                                        try { window.bbLogger && window.bbLogger.log('dashboard_view', dashboardKey, currentUser, { source: 'desktop_carrusel_click' }); } catch(e) { console.warn('Log error:', e); }
                                        loadDashboard(dashboardUrls[dashboardKey], dashboardKey);
                                    }
                                });
                                img.addEventListener('mouseenter', function() {
                                    if (autoPlayInterval) { clearInterval(autoPlayInterval); isAutoPlay = false; }
                                });
                                img.addEventListener('mouseleave', function() {
                                    if (!isAutoPlay) { isAutoPlay = true; startAutoPlay(); }
                                });
                            });

                            // Click en botón CTA
                            document.querySelectorAll('.slide-cta').forEach(btn => {
                                btn.addEventListener('click', function() {
                                    const dashboardKey = this.getAttribute('data-key');
                                    if (dashboardKey && dashboardUrls[dashboardKey]) {
                                        try { window.bbLogger && window.bbLogger.log('dashboard_view', dashboardKey, currentUser, { source: 'desktop_cta_click' }); } catch(e) { console.warn('Log error:', e); }
                                        loadDashboard(dashboardUrls[dashboardKey], dashboardKey);
                                    }
                                });
                            });
                        }
                        
                        // 🔧 FUNCIONES DE CONTROL DEL CARRUSEL
                        function showNextSlide() {
                            currentSlide = (currentSlide + 1) % carruselData.length;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function showPrevSlide() {
                            currentSlide = (currentSlide - 1 + carruselData.length) % carruselData.length;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function goToSlide(index) {
                            currentSlide = index;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function updateCarrusel() {
                            const slides = document.querySelectorAll('.carrusel-slide');
                            const indicators = document.querySelectorAll('.carrusel-indicator');

                            slides.forEach(slide => slide.classList.remove('active'));
                            indicators.forEach(indicator => indicator.classList.remove('active'));

                            if (slides[currentSlide]) slides[currentSlide].classList.add('active');
                            if (indicators[currentSlide]) indicators[currentSlide].classList.add('active');

                            const counter = document.getElementById('slideCounter');
                            if (counter) counter.textContent = \`\${currentSlide + 1} / \${carruselData.length}\`;
                        }
                        
                        function startAutoPlay() {
                            if (isAutoPlay && carruselData.length > 1) {
                                autoPlayInterval = setInterval(showNextSlide, 5000);
                            }
                        }
                        
                        // ✅ FUNCIÓN PARA CARGAR DASHBOARD
                        function loadDashboard(dashboardUrl, dashboardKey) {
                            const iframeLoading = document.getElementById('iframeLoading');
                            const contentContainer = document.getElementById('contentContainer');
                            const menuItems = document.querySelectorAll('.menu-item');
                            
                            // Mostrar loading
                            iframeLoading.style.display = 'block';
                            
                            // Si es el carrusel
                            if (dashboardUrl === 'carrusel_integrado') {
                                // Reconstruir el carrusel completamente
                                contentContainer.innerHTML = \`
                                    <div class="carrusel-header">
                                        <h1 class="carrusel-title">BB <span>Analytics 360</span> <span style="font-size:14px;font-weight:400;color:rgba(255,215,0,0.7);margin-left:6px;">V1.81</span></h1>
                                        <div class="carrusel-permission-info" id="carruselPermissionInfo">
                                            <i class="fas fa-user-check"></i> Cargando información...
                                        </div>
                                    </div>
                                    <div class="carrusel-slider" id="carruselSlider">
                                        <div style="text-align:center;color:white;display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;">
                                            <div class="spinner" style="margin:0 auto;"></div>
                                            <p style="color:rgba(255,255,255,0.5);font-size:14px;">Cargando dashboards...</p>
                                        </div>
                                    </div>
                                \`;
                                
                                // Inicializar el carrusel
                                setTimeout(() => {
                                    initCarrusel();
                                    iframeLoading.style.display = 'none';
                                }, 100);
                                
                                // Actualizar menú
                                menuItems.forEach(menuItem => {
                                    menuItem.classList.remove('active');
                                    if (menuItem.getAttribute('data-src') === 'carrusel_integrado') {
                                        menuItem.classList.add('active');
                                    }
                                });
                            } 
                            // Si es un dashboard externo
                            else if (dashboardUrl && dashboardUrl !== '#') {
                                // Detener carrusel si estaba activo
                                if (autoPlayInterval) {
                                    clearInterval(autoPlayInterval);
                                    autoPlayInterval = null;
                                }

                                // Reutilizar iframe existente si ya existe (más rápido que recrearlo)
                                let iframe = document.getElementById('dashboardFrame');
                                if (!iframe) {
                                    contentContainer.innerHTML = \`<iframe
                                        id="dashboardFrame"
                                        frameborder="0"
                                        allowfullscreen="true"
                                        allow="fullscreen"
                                        style="width:100%;height:100%;border:none;"
                                    ></iframe>\`;
                                    iframe = document.getElementById('dashboardFrame');
                                } else {
                                    // Ya existe: solo cambiar el src
                                    iframeLoading.style.display = 'block';
                                }

                                // Timeout de seguridad: si tarda más de 20s mostrar mensaje
                                const loadTimeout = setTimeout(() => {
                                    iframeLoading.style.display = 'none';
                                    const existing = document.getElementById('pbi-error-msg');
                                    if (!existing) {
                                        const msg = document.createElement('div');
                                        msg.id = 'pbi-error-msg';
                                        msg.style.cssText = 'position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#FFD700;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;text-align:center;';
                                        msg.innerHTML = '⚠️ El reporte tardó más de lo esperado. Verifica que tengas acceso en Power BI.';
                                        contentContainer.style.position = 'relative';
                                        contentContainer.appendChild(msg);
                                        setTimeout(() => msg.remove(), 6000);
                                    }
                                }, 20000);

                                // Ocultar loading cuando el iframe cargue
                                iframe.onload = function() {
                                    clearTimeout(loadTimeout);
                                    iframeLoading.style.display = 'none';
                                };

                                iframe.onerror = function() {
                                    clearTimeout(loadTimeout);
                                    iframeLoading.style.display = 'none';
                                };

                                // Asignar src después de configurar eventos
                                iframe.src = dashboardUrl;
                            }
                            
                            // Ocultar sidebar si está abierto
                            const sidebar = document.getElementById('sidebar');
                            const overlay = document.getElementById('overlay');
                            const iframeContainer = document.getElementById('iframeContainer');
                            const toggleBtn = document.getElementById('toggleBtn');
                            if (sidebar && sidebar.classList.contains('active')) {
                                sidebar.classList.remove('active');
                                if (overlay) overlay.classList.remove('active');
                                if (iframeContainer) {
                                    iframeContainer.classList.remove('sidebar-open');
                                }
                                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                            }
                        }
                        
                        // 🚪 FUNCIÓN PARA REGISTRAR LOGOUT EN AIRTABLE
                        function registerLogout() {
                            if (window.logoutRegistered) {
                                console.log('⚠️ Logout ya registrado, ignorando...');
                                return true;
                            }
                            
                            try {
                                console.log('🚪 Registrando logout por botón');
                                
                                // Marcar inmediatamente que ya se registró logout
                                window.logoutRegistered = true;
                                
                                // Crear datos de logout
                                const logoutData = {
                                    user: currentUser,
                                    action: 'logout',
                                    logoutType: 'button_click',
                                    timestamp: new Date().toISOString(),
                                    sessionId: currentSessionId,
                                    deviceType: 'desktop',
                                    registeredAt: Date.now(),
                                    sessionDuration: Date.now() - parseInt(currentSessionId.split('_')[1])
                                };
                                
                                // Enviar mensaje al padre (login page) para logging en Supabase
                                if (window.opener && !window.opener.closed) {
                                    try {
                                        window.opener.postMessage({
                                            type: 'logout',
                                            ...logoutData,
                                            source: 'dashboard_button'
                                        }, '*');
                                        
                                        console.log('📤 Mensaje de logout enviado al padre para Supabase');
                                        
                                    } catch (error) {
                                        console.warn('Error enviando mensaje al padre:', error);
                                        localStorage.setItem('pending_logout', JSON.stringify(logoutData));
                                    }
                                } else {
                                    localStorage.setItem('pending_logout', JSON.stringify(logoutData));
                                }
                                
                                console.log('✅ Logout registrado exitosamente');
                                return true;
                                
                            } catch (error) {
                                console.error('❌ Error registrando logout:', error);
                                return false;
                            }
                        }
                        
                        // 🔹 TOGGLE ÁRBOL DE ÁREAS
                        function toggleArea(idx) {
                            const children = document.getElementById('area-children-' + idx);
                            const chevron = document.getElementById('chevron-' + idx);
                            if (!children) return;
                            const isOpen = children.classList.contains('open');
                            children.classList.toggle('open', !isOpen);
                            if (chevron) chevron.classList.toggle('open', !isOpen);
                        }

                        document.addEventListener('DOMContentLoaded', function() {
                            const toggleBtn = document.getElementById('toggleBtn');
                            const sidebar = document.getElementById('sidebar');
                            const overlay = document.getElementById('overlay');
                            const iframeContainer = document.getElementById('iframeContainer');
                            const menuItems = document.querySelectorAll('.menu-item');
                            const telegramBtn = document.getElementById('telegramBtn');
                            const exitBtn = document.getElementById('exitBtn');
                            const iframeLoading = document.getElementById('iframeLoading');
                            const contextMenuMessage = document.getElementById('contextMenuMessage');
                            
                            let isSidebarOpen = false;
                            
                            // 🔒 FUNCIONES DE SEGURIDAD
                            function blockRightClickOnSidebar(e) {
                                e.preventDefault();
                                showContextMenuMessage();
                                return false;
                            }
                            
                            function showContextMenuMessage() {
                                contextMenuMessage.style.display = 'block';
                                setTimeout(() => {
                                    contextMenuMessage.style.display = 'none';
                                }, 3000);
                            }
                            
                            function applySecurityBlocks() {
                                sidebar.addEventListener('contextmenu', blockRightClickOnSidebar);
                            }
                            
                            // 📱 FUNCIONES DE LA APLICACIÓN
                            function openWhatsApp() {
                                const phone = '524421974414';
                                const message = 'Hola, necesito ayuda con BB Analytics 360';
                                window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(message), '_blank');
                            }

                            function openTelegram() {
                                const phoneNumber = '+524421974414';
                                const message = 'Hola, necesito ayuda en BB Analytics 360';
                                const url = 'https://t.me/Business_Intelligence_BB';
                                window.open(url, '_blank');
                            }
                            
                            function toggleSidebar() {
                                isSidebarOpen = !isSidebarOpen;
                                sidebar.classList.toggle('active');
                                overlay.classList.toggle('active');
                                iframeContainer.classList.toggle('sidebar-open');
                                // Rotar isotipo al abrir
                                if (isSidebarOpen) {
                                    const logo = sidebar.querySelector('.sidebar-logo');
                                    if (logo) { logo.classList.remove('spinning'); void logo.offsetWidth; logo.classList.add('spinning'); }
                                }
                            }

                            
                            function logout() {
                                if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                                    // ✅ REGISTRAR LOGOUT POR BOTÓN EN AIRTABLE
                                    const registered = registerLogout();
                                    
                                    if (registered) {
                                        // Cerrar después de un breve delay para permitir el logging
                                        setTimeout(() => {
                                            try {
                                                window.close();
                                            } catch (error) {
                                                console.warn('No se pudo cerrar ventana:', error);
                                                window.location.href = window.opener ? window.opener.location.href : 'about:blank';
                                            }
                                        }, 1000);
                                    } else {
                                        alert('Error registrando logout. La ventana se cerrará de todos modos.');
                                        setTimeout(() => {
                                            try {
                                                window.close();
                                            } catch (error) {
                                                window.location.href = 'about:blank';
                                            }
                                        }, 100);
                                    }
                                }
                            }
                            
                            // 🎯 EVENT LISTENERS
                            toggleBtn.addEventListener('click', toggleSidebar);
                            overlay.addEventListener('click', toggleSidebar);
                            
                            // ✅ CORRECCIÓN: Event listeners para los botones del menú
                            menuItems.forEach(item => {
                                item.addEventListener('click', function() {
                                    const dashboardUrl = this.getAttribute('data-src');
                                    const dashboardKey = Object.keys(dashboardUrls).find(key => 
                                        dashboardUrls[key] === dashboardUrl
                                    ) || (dashboardUrl === 'carrusel_integrado' ? 'principal' : null);
                                    
                                    if (dashboardUrl) {
                                        // Actualizar estado activo
                                        menuItems.forEach(menuItem => {
                                            menuItem.classList.remove('active');
                                        });
                                        this.classList.add('active');
                                        
                                        // Registrar acceso si no es el carrusel (fire-and-forget)
                                        if (dashboardKey && dashboardKey !== 'principal') {
                                            try { window.bbLogger && window.bbLogger.log('dashboard_view', dashboardKey, currentUser, { source: 'desktop_menu_click' }); } catch(e) { console.warn('Log error:', e); }
                                        }
                                        
                                        // Cargar el dashboard usando la función global loadDashboard
                                        loadDashboard(dashboardUrl, dashboardKey);
                                    }
                                });
                            });
                            
                            // Botones de ayuda
                            const whatsappBtn = document.getElementById('whatsappBtn');
                            if (whatsappBtn) {
                                whatsappBtn.addEventListener('click', openWhatsApp);
                            }
                            if (telegramBtn) {
                                telegramBtn.addEventListener('click', openTelegram);
                            }
                            
                            // Botón de salir
                            exitBtn.addEventListener('click', logout);
                            
                            // 📋 INICIALIZACIÓN
                            applySecurityBlocks();
                            
                            // Inicializar carrusel automáticamente
                            initCarrusel();
                            
                            // Registrar cierre de ventana/pestaña
                            window.addEventListener('beforeunload', function(e) {
                                if (!window.logoutRegistered) {
                                    console.log('⚠️ Ventana cerrada sin logout formal');
                                    
                                    // Intentar registrar como logout automático
                                    if (window.opener && !window.opener.closed) {
                                        window.opener.postMessage({
                                            type: 'logout',
                                            user: currentUser,
                                            action: 'logout',
                                            logoutType: 'window_close',
                                            sessionId: currentSessionId,
                                            timestamp: new Date().toISOString(),
                                            source: 'window_beforeunload'
                                        }, '*');
                                    }
                                }
                            });
                        });
                    <\/script>
                </body>
                </html>
            `;
        }
    </script>
