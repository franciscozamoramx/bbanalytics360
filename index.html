    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }
        
        body {
            background: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        html {
            background: linear-gradient(135deg, #0f1e4a 0%, #152c6e 100%);
            min-height: 100%;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo {
            max-width: 250px;
            margin: 0 auto 20px;
            display: block;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            color: white;
        }
        
        .title-highlight {
            color: #FFD700;
            font-weight: bold;
        }
        
        .version {
            font-size: 14px;
            color: #FFD700;
            font-weight: normal;
            vertical-align: super;
            margin-left: 5px;
            opacity: 0.8;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(to bottom, #FFD700, #FF8C00);
            color: #152c6e;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to bottom, #FFE600, #FF9E00);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s 1s infinite;
        }
        @keyframes shimmer {
            0%        { left: -100%; }
            40%, 100% { left: 150%; }
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            text-align: left;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            outline: none;
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .form-group .field-icon {
            position: absolute;
            left: 13px;
            bottom: 13px;
            width: 18px;
            height: 18px;
            opacity: 0.4;
            transition: opacity 0.3s, filter 0.3s;
            pointer-events: none;
        }

        .form-group:focus-within .field-icon {
            opacity: 1;
            filter: drop-shadow(0 0 4px #FFD700);
        }

        .login-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.45), transparent);
            transform: scaleX(0);
            animation: divExpand 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
            transform-origin: center;
        }

        @keyframes divExpand {
            to { transform: scaleX(1); }
        }
        
        .user-info {
            margin-top: 15px;
            font-size: 14px;
            color: #FFD700;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);
            color: #90EE90;
        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #FFB6C1;
        }
        
        .status-loading {
            background: rgba(255, 255, 0, 0.2);
            color: #FFD700;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            p {
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>

    <script>
        // ==================== DASHBOARDS DESDE SUPABASE ====================
        const BB_SUPABASE_URL = 'https://sjljxynqpsyrhjefevdp.supabase.co';
        const BB_SUPABASE_KEY = 'sb_publishable_LpBbCf9gaDgQa7Bmn6c6QQ_a2sYf5y7';

        // Objetos globales — se llenan al cargar desde Supabase
        let dashboardUrls        = {};
        let dashboardMobileUrls  = {};
        let dashboardNames       = {};
        let dashboardIcons       = {};
        let dashboardImages      = {};
        let dashboardDescriptions = {};
        let areaConfig           = [];

        const AREA_META = {
            auditoria:   { label: 'Auditoría', color: '#FFB84A' },
            comercial:   { label: 'Comercial',  color: '#4A9EFF' },
            finanzas:    { label: 'Finanzas',   color: '#B47FFF' },
            productos:   { label: 'Máquinas',   color: '#3DD68C' },
            operaciones: { label: 'Operaciones',color: '#00C9A7' },
            ti:          { label: 'TI',         color: '#FF7A6E' }
        };

        async function loadDashboardsFromSupabase() {
            try {
                const res = await fetch(
                    `${BB_SUPABASE_URL}/rest/v1/dashboards?select=*&activo=eq.true&order=area,orden`,
                    {
                        headers: {
                            'apikey': BB_SUPABASE_KEY,
                            'Authorization': 'Bearer ' + BB_SUPABASE_KEY
                        }
                    }
                );
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const rows = await res.json();

                const areaMap = {};

                rows.forEach(d => {
                    dashboardNames[d.id]        = d.nombre;
                    dashboardIcons[d.id]        = d.icono || 'fas fa-chart-bar';
                    dashboardImages[d.id]       = d.imagen_url || 'https://i.postimg.cc/QCN4dPG1/analisis-de-datos.png';
                    dashboardDescriptions[d.id] = d.descripcion || 'Dashboard de Business Intelligence';
                    dashboardUrls[d.id]         = d.embed_url || '';
                    if (d.mobile_url) dashboardMobileUrls[d.id] = d.mobile_url;

                    if (d.area && AREA_META[d.area]) {
                        if (!areaMap[d.area]) areaMap[d.area] = [];
                        areaMap[d.area].push(d.id);
                    }
                });

                // Reconstruir areaConfig en orden fijo
                const AREA_ORDER = ['auditoria', 'comercial', 'finanzas', 'productos', 'operaciones', 'ti'];
                areaConfig = AREA_ORDER
                    .filter(k => areaMap[k] && areaMap[k].length > 0)
                    .map(k => ({
                        key:        k,
                        label:      AREA_META[k].label,
                        color:      AREA_META[k].color,
                        dashboards: areaMap[k]
                    }));

                console.log('✅ Dashboards cargados desde Supabase:', rows.length);
            } catch (err) {
                console.error('❌ Error cargando dashboards desde Supabase:', err);
                // Fallback: objetos quedan vacíos — el portal mostrará sin dashboards
            }
        }

        // ==================== AIRTABLE LOGGER COMPLETO ====================        // ==================== AIRTABLE LOGGER COMPLETO ====================
        const LOGGING_ENABLED = true;
        let currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let userIP = null;

        // CONFIGURACIÓN SUPABASE
        const SUPABASE_CONFIG = {
            url: 'https://sjljxynqpsyrhjefevdp.supabase.co',
            apiKey: 'sb_publishable_LpBbCf9gaDgQa7Bmn6c6QQ_a2sYf5y7',
            table: 'logs'
        };

        class SupabaseLogger {
            constructor() {
                this.pendingLogs = [];
                this.isOnline = navigator.onLine;
                
                // Obtener IP del usuario
                this.getUserIP();
                
                this.init();
            }
            
            async init() {
                // Detectar conexión
                window.addEventListener('online', () => {
                    this.isOnline = true;
                    this.flushPendingLogs();
                });
                
                window.addEventListener('offline', () => {
                    this.isOnline = false;
                });
                
                // Cargar pendientes
                this.loadPendingLogs();
                
                // Sincronizar cada 30 segundos
                setInterval(() => this.flushPendingLogs(), 30000);
                
                console.log('✅ Logger Supabase inicializado');
            }
            
            // Obtener IP del usuario (no bloqueante, con timeout de 3s)
            getUserIP() {
                const timeout = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('timeout')), 3000)
                );
                Promise.race([
                    fetch('https://api.ipify.org?format=json').then(r => r.json()),
                    timeout
                ])
                .then(data => {
                    userIP = data.ip;
                    console.log('🌐 IP obtenida:', userIP);
                })
                .catch(() => {
                    userIP = 'IP no disponible';
                    console.warn('No se pudo obtener IP externa');
                });
            }
            
            // Detectar tipo de dispositivo
            detectDeviceType() {
                const userAgent = navigator.userAgent.toLowerCase();
                const screenWidth = window.screen.width;
                
                if (/mobile|android|iphone|ipad|ipod/.test(userAgent)) {
                    if (screenWidth >= 768) {
                        return 'tablet';
                    }
                    return 'mobile';
                }
                
                if (screenWidth >= 768 && screenWidth <= 1024) {
                    if (/android|ipad/.test(userAgent)) {
                        return 'tablet';
                    }
                }
                
                return 'desktop';
            }
            
            // Registrar evento
            async log(action, dashboard = null, user = null, extraData = {}) {
                const logEntry = {
                    id: 'log_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    timestamp: new Date().toISOString(),
                    fechaHoraLocal: new Date().toLocaleString('es-MX'),
                    user: user || currentUser || 'anonymous',
                    action: action,
                    dashboard: dashboard,
                    dashboardName: dashboard ? dashboardNames[dashboard] : null,
                    deviceType: this.detectDeviceType(),
                    screen: `${window.screen.width}x${window.screen.height}`,
                    userAgent: navigator.userAgent,
                    ip: userIP || 'Obteniendo...',
                    sessionId: currentSessionId,
                    extraData: extraData
                };
                
                console.log('📝 Registrando:', {
                    usuario: logEntry.user,
                    accion: logEntry.action,
                    dashboard: logEntry.dashboardName,
                    dispositivo: logEntry.deviceType,
                    ip: logEntry.ip,
                    extra: extraData
                });
                
                // 1. Guardar localmente
                this.saveToLocalStorage(logEntry);
                
                // 2. Intentar enviar a Supabase
                if (this.isOnline) {
                    try {
                        await this.sendToSupabase(logEntry);
                        console.log('✅ Log enviado a Supabase');
                    } catch (error) {
                        console.warn('⚠️ Error Supabase, guardando pendiente:', error.message);
                        this.saveAsPending(logEntry);
                    }
                } else {
                    this.saveAsPending(logEntry);
                    console.log('📦 Log guardado como pendiente (offline)');
                }
                
                return logEntry;
            }
            
            // Enviar a Supabase
            async sendToSupabase(logEntry) {
                // Fecha en hora México (America/Mexico_City) forzado con Intl
                const now = new Date();
                const parts = new Intl.DateTimeFormat('en-CA', {
                    timeZone: 'America/Mexico_City',
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false
                }).formatToParts(now);
                const p = {};
                parts.forEach(({type, value}) => { p[type] = value; });
                const localISO = `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`;

                const record = {
                    "FechaHora": localISO,
                    "Usuario": logEntry.user,
                    "Accion": logEntry.action,
                    "Dashboard": logEntry.dashboard || '',
                    "DashboardName": logEntry.dashboardName || '',
                    "Dispositivo": logEntry.deviceType,
                    "IP": logEntry.ip,

                    if (logs.length > 1000) {

                    }
                    
                    localStorage.setItem(key, JSON.stringify(logs));
                } catch (error) {

            saveAsPending(logEntry) {
                try {
                    const key = 'bi_logs_pending';

                    pending.push({

                        retries: 0
                    });
                    
                    if (pending.length > 200) {
                        pending = pending.slice(-200);
                    }
                    
                    localStorage.setItem(key, JSON.stringify(pending));
                } catch (error) {

            // Sincronizar pendientes
            async flushPendingLogs() {
                if (!this.isOnline) return;
                
                const pendingKey = 'bi_logs_pending';
                let pending = JSON.parse(localStorage.getItem(pendingKey) || '[]');
                
                if (pending.length === 0) return;
                
                console.log(`🔄 Sincronizando ${pending.length} logs pendientes...`);
                
                const remaining = [];
                
                for (let i = 0; i < pending.length; i++) {
                    const logEntry = pending[i];
                    
                    try {
                        await this.sendToSupabase(logEntry);
                        console.log(`✅ Pendiente ${i+1} enviado`);
                    } catch (error) {
                        logEntry.retries = (logEntry.retries || 0) + 1;
                        
                        if (logEntry.retries <= 3) {
                            remaining.push(logEntry);
                        }
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                localStorage.setItem(pendingKey, JSON.stringify(remaining));
                console.log(`✅ Sincronizados, ${remaining.length} aún pendientes`);

        async function handleLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            
            if (!email) {
                showStatus('Por favor ingresa tu correo electrónico', 'error');
                return;
            }

            if (!email.endsWith('@bigbola.com')) {
                showStatus('Solo se permiten correos corporativos @bigbola.com. Si eres colaborador externo, contacta a tu administrador.', 'error');
                return;
            }
            
            if (!permissionsData) {
                showStatus('Error: Los permisos no se han cargado correctamente. Intenta nuevamente.', 'error');
                return;
            }
            
            // Resolver alias — si el email es alias de otro usuario, usar el usuario principal
            let resolvedEmail = email;
            if (permissionsData.users && !permissionsData.users[email]) {
                const found = Object.entries(permissionsData.users).find(([user, data]) =>
                    data.aliases && data.aliases.map(a => a.toLowerCase()).includes(email)
                );
                if (found) resolvedEmail = found[0];
            }

            if (permissionsData.users && permissionsData.users[resolvedEmail]) {
                currentUser = resolvedEmail;
                currentUserPermissions = permissionsData.users[resolvedEmail].dashboards || [];
                currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                // ✅ CAMBIO 3: Fire-and-forget — no bloquea la apertura del dashboard
                logger.log('login', null, currentUser);
                
                // Mostrar información breve
                document.getElementById('userEmail').textContent = email;
                document.getElementById('dashboardsCount').textContent = currentUserPermissions.filter(d => d !== 'principal').length;
                document.getElementById('userInfo').style.display = 'block';
                
                showStatus('Acceso concedido. Abriendo BB Analytics 360...', 'success');
                
                console.log('=== LOGIN EXITOSO ===');
                console.log('Usuario:', currentUser);
                console.log('Dashboards permitidos:', currentUserPermissions.length);
                console.log('Lista de dashboards:', currentUserPermissions);
                console.log('Session ID:', currentSessionId);
                console.log('=====================');
                
                // ✅ CAMBIO 4: Delay reducido de 1000ms a 200ms (solo para leer el mensaje)
                setTimeout(() => {
                    openDashboard();
                }, 200);
                
            } else {
                // Si el usuario no existe, recargar permisos frescos
                showStatus('Verificando permisos actualizados...', 'success');
                setTimeout(async () => {
                    await loadPermissions();
                    if (permissionsData.users && (permissionsData.users[email] || Object.values(permissionsData.users).some(d => d.aliases && d.aliases.map(a=>a.toLowerCase()).includes(email)))) {
                        handleLogin(); // reintentar con datos frescos
                        } else {
                            logger.log('login_failed', null, email);
                            showStatus('No tienes permisos para acceder a BB Analytics 360 o el correo no está registrado.', 'error');
                        }
                    }, 500);
                } else {
                    // Fire-and-forget para login fallido también
                    logger.log('login_failed', null, email);
                    showStatus('No tienes permisos para acceder a BB Analytics 360 o el correo no está registrado.', 'error');
                }
            }
        }

                    /* Estilos para carrusel móvil */
                    .carrusel-container {
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        background: #0d1b4b;
                        background-image:
                            radial-gradient(ellipse at 20% 50%, rgba(42,75,159,0.5) 0%, transparent 60%),
                            radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.07) 0%, transparent 50%);
                        overflow: hidden;
                        padding: 20px 16px;
                        gap: 0;
                        position: relative;
                    }

                    .carrusel-container::before {
                        content: '';
                        position: absolute;
                        inset: 0;
                        background-image:
                            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
                        background-size: 40px 40px;
                        pointer-events: none;
                    }
                    
                    .carrusel-title {
                        color: white;
                        font-size: 24px;
                        margin-bottom: 20px;
                        text-align: center;
                        padding: 0 10px;
                    }
                    
                    .carrusel-title span {
                        color: #FFD700;
                        font-weight: bold;
                    }
                    
                    .carrusel-permission-info {
                        color: #FFD700;
                        font-size: 14px;
                        margin-bottom: 20px;
                        text-align: center;
                    }
                    
                    .carrusel-slider {
                        width: 100%;
                        height: 60vh;
                        position: relative;
                        overflow: hidden;
                        border-radius: 15px;
                        background: transparent;
                    }
                    
                    .carrusel-slide {
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        opacity: 0;
                        pointer-events: none;
                        transition: opacity 0.8s ease-in-out;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        background-color: transparent;
                        padding: 20px;
                        text-align: center;
                    }
                    
                    .carrusel-slide.active {
                        opacity: 1;
                        pointer-events: auto;
                    }
                    
                    .carrusel-slide img {
                        max-width: 60%;
                        max-height: 50%;
                        object-fit: contain;
                        border-radius: 10px;
                        margin-bottom: 15px;
                        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
                        cursor: pointer;
                        transition: transform 0.3s ease;
                        z-index: 10;
                        position: relative;
                    }

                    .carrusel-slide img:hover {
                        transform: scale(1.02);
                    }
                    
                    .carrusel-slide h3 {
                        color: white;
                        font-size: 20px;
                        margin-bottom: 10px;
                        font-weight: bold;
                        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
                    }
                    
                    .carrusel-slide p {
                        color: #FFD700;
                        font-size: 14px;
                        line-height: 1.4;
                        max-width: 100%;
                        margin: 0 auto 15px;
                        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
                    }
                    
                    .carrusel-slide .dashboard-title {
                        color: white;
                        font-size: 18px;
                        margin-bottom: 8px;
                        font-weight: bold;
                    }
                    
                    .carrusel-slide .dashboard-desc {
                        color: #FFD700;
                        font-size: 12px;
                        margin-bottom: 10px;
                    }
                    
                    .carrusel-indicators {
                        display: flex;
                        justify-content: center;
                        gap: 10px;
                        margin-top: 20px;
                        position: absolute;
                        bottom: 15px;
                        left: 0;
                        right: 0;
                    }
                    
                    .carrusel-indicator {
                        width: 10px;
                        height: 10px;
                        background-color: rgba(255, 255, 255, 0.4);
                        border-radius: 50%;
                        cursor: pointer;
                        transition: background-color 0.3s, transform 0.3s;
                    }
                    
                    .carrusel-indicator.active {
                        background-color: #FFD700;
                        transform: scale(1.3);
                    }
                    
                    .carrusel-nav {
                        position: absolute;
                        top: 50%;
                        transform: translateY(-50%);
                        background-color: rgba(21, 44, 110, 0.8);
                        color: white;
                        border: none;
                        width: 40px;
                        height: 40px;
                        border-radius: 50%;
                        cursor: pointer;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        font-size: 18px;
                        z-index: 10;
                        transition: background-color 0.3s;
                    }
                    
                    .carrusel-nav:hover {
                        background-color: rgba(21, 44, 110, 1);
                    }
                    
                    .carrusel-prev {
                        left: 10px;
                    }
                    
                    .carrusel-next {
                        right: 10px;
                    }
                    
                    .carrusel-slide-description {
                        font-style: italic;
                        color: #FFD700;
                        margin-top: 8px;
                        font-size: 12px;
                    }
                    
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }

                    /* Hint de rotación */
                    #rotateHint {
                        position: fixed;
                        bottom: 28px;
                        left: 50%;
                        transform: translateX(-50%);
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        background: rgba(13, 27, 75, 0.93);
                        border: 1px solid rgba(255, 215, 0, 0.4);
                        border-radius: 50px;
                        padding: 12px 24px 12px 18px;
                        z-index: 9999;
                        white-space: nowrap;
                        box-shadow: 0 6px 28px rgba(0,0,0,0.5);
                        animation: hintFadeIn 0.35s ease forwards;
                    }

                    #rotateHint.hiding {
                        animation: hintFadeOut 0.4s ease forwards;
                    }

                    @keyframes hintFadeIn {
                        from { opacity: 0; transform: translateX(-50%) translateY(16px); }
                        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
                    }

                    @keyframes hintFadeOut {
                        from { opacity: 1; transform: translateX(-50%) translateY(0); }
                        to   { opacity: 0; transform: translateX(-50%) translateY(16px); }
                    }

                    /* Parpadeo del ícono */
                    #rotateHint .rotate-icon {
                        flex-shrink: 0;
                        animation: iconBlink 0.8s ease-in-out infinite;
                    }

                    @keyframes iconBlink {
                        0%   { opacity: 1;   transform: scale(1); }
                        50%  { opacity: 0.2; transform: scale(0.88); }
                        100% { opacity: 1;   transform: scale(1); }
                    }

                    /* Parpadeo del texto */
                    #rotateHint .rotate-text {
                        color: #FFD700;
                        font-size: 13px;
                        font-weight: 600;
                        letter-spacing: 0.02em;
                        animation: textBlink 0.8s ease-in-out infinite;
                    }

                    @keyframes textBlink {
                        0%   { opacity: 1; }
                        50%  { opacity: 0.25; }
                        100% { opacity: 1; }
                    }
                    
                    /* Landscape: botón más pequeño y compacto */
                    @media (orientation: landscape) {
                        .mobile-floating-toggle {
                            width: 28px;
                            height: 40px;
                            font-size: 13px;
                            top: 8px;
                            opacity: 0.75;
                        }
                        .mobile-floating-toggle:active {
                            opacity: 1;
                        }
                    }

                    @media (max-width: 600px) {
                        .mobile-floating-toggle {
                            width: 45px;
                            height: 45px;
                            font-size: 18px;
                            top: 15px;
                            left: 15px;
                        }
                        
                        .mobile-sidebar { width: 260px; }
                        
                        .mobile-iframe-container.sidebar-open {
                            left: 260px;
                            width: calc(100% - 260px);
                        }
                        
                        .carrusel-title {
                            font-size: 20px;
                        }
                        
                        .carrusel-slider {
                            height: 55vh;
                        }
                        
                        .carrusel-slide h3 {
                            font-size: 18px;
                        }
                        
                        .carrusel-slide p {
                            font-size: 13px;
                        }
                    }
                    
                    @media (max-width: 400px) {
                        .carrusel-slider {
                            height: 50vh;
                        }
                        
                        .carrusel-title {
                            font-size: 18px;
                        }
                        
                        .carrusel-slide h3 {
                            font-size: 16px;
                        }
                        
                        .carrusel-slide p {
                            font-size: 12px;
                        }
                    }
                </style>
            `;
        }

                const data = [];
                
                currentUserPermissions.forEach(dashboardKey => {
                    if (dashboardKey !== 'diccionario' && dashboardUrls[dashboardKey]) {
                        const imageUrl = dashboardImages[dashboardKey] || 'https://i.postimg.cc/QCN4dPG1/analisis-de-datos.png';
                        const description = dashboardDescriptions[dashboardKey] || 'Dashboard de Business Intelligence';
                        
                        data.push({
                            key: dashboardKey,
                            title: dashboardNames[dashboardKey],
                            image: imageUrl,
                            description: description,
                            icon: dashboardIcons[dashboardKey],
                            url: dashboardUrls[dashboardKey]
                        });
                    }
                });
                
                return data;
            }

                const indicators = document.querySelectorAll('.carrusel-indicator');
                const slideImages = document.querySelectorAll('.carrusel-slide img');

            function showMobilePrevSlide() {

            function updateMobileCarrusel() {
                const slides = document.querySelectorAll('.carrusel-slide');
                const indicators = document.querySelectorAll('.carrusel-indicator');

                slides.forEach(slide => slide.classList.remove('active'));
                indicators.forEach(indicator => indicator.classList.remove('active'));

                if (slides[currentMobileSlide]) slides[currentMobileSlide].classList.add('active');
                if (indicators[currentMobileSlide]) indicators[currentMobileSlide].classList.add('active');

                const counter = document.getElementById('mobileSlideCounter');

            // 📱 MOSTRAR HINT DE ROTACIÓN EN PORTRAIT
            let _rotateCheckInterval = null;

            function showRotateHint() {
                const isPortrait = window.innerHeight > window.innerWidth;
                if (!isPortrait) return;

                _doShowHint();

                // Verificar cada 10s si sigue en portrait; si es así, volver a mostrar
                if (_rotateCheckInterval) clearInterval(_rotateCheckInterval);
                _rotateCheckInterval = setInterval(() => {
                    const stillPortrait = window.innerHeight > window.innerWidth;
                    if (stillPortrait) {
                        _doShowHint();
                    } else {
                        clearInterval(_rotateCheckInterval);
                        _rotateCheckInterval = null;
                    }
                }, 10000);
            }

                const existing = document.getElementById('rotateHint');
                if (existing) existing.remove();

                const hint = document.createElement('div');
                hint.id = 'rotateHint';
                hint.innerHTML = `

                document.body.appendChild(hint);

                // Desaparecer tras 4 segundos

                        /* 🔹 ESTILOS PARA CARRUSEL INTEGRADO - RESPONSIVO */

                                radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.07) 0%, transparent 50%),

                        .carrusel-header {

                            color: rgba(255,255,255,0.8);

                        .carrusel-permission-info i { color: #FFD700; }

                        /* Slider ocupa todo el espacio disponible */
                        .carrusel-slider {
                            width: 100%;
                            max-width: 1400px;
                            flex: 1;
                            min-height: 0;
                            position: relative;
                            z-index: 2;
                            overflow: hidden;
                            border-radius: 18px;
                            border: 1px solid rgba(255,255,255,0.1);
                            box-shadow: 0 24px 70px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,0,0.06);
                            background: rgba(255,255,255,0.04);
                        }

                        .carrusel-slide {
                            position: absolute;
                            inset: 0;
                            opacity: 0;
                            pointer-events: none;
                            transition: opacity 0.7s ease;
                            display: grid;
                            grid-template-columns: 55% 45%;
                            align-items: stretch;
                        }

                        .carrusel-slide.active { opacity: 1; pointer-events: auto; }

                        .slide-image-panel {
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            padding: clamp(20px, 3vh, 44px) clamp(20px, 2.5vw, 40px);
                            position: relative;
                        }

                        .slide-image-panel::after {
                            content: '';
                            position: absolute;
                            right: 0; top: 12%; bottom: 12%;
                            width: 1px;
                            background: linear-gradient(to bottom, transparent, rgba(255,215,0,0.3), transparent);
                        }

                        .carrusel-slide img {
                            width: 100%;
                            height: 100%;
                            max-height: 100%;
                            object-fit: contain;
                            border-radius: 10px;
                            cursor: pointer;
                            transition: transform 0.35s ease, box-shadow 0.35s ease;
                            box-shadow: 0 10px 36px rgba(0,0,0,0.5);
                        }

                        .carrusel-slide img:hover {
                            transform: scale(1.025);
                            box-shadow: 0 18px 50px rgba(0,0,0,0.6);
                        }

                        .slide-info-panel {
                            padding: clamp(24px, 4vh, 56px) clamp(24px, 3vw, 52px) clamp(24px, 4vh, 56px) clamp(20px, 2.5vw, 40px);
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            gap: clamp(8px, 1.2vh, 16px);
                        }

                        .slide-area-badge {
                            display: inline-flex;
                            align-items: center;
                            gap: 6px;
                            background: rgba(255,215,0,0.1);
                            border: 1px solid rgba(255,215,0,0.25);
                            color: #FFD700;
                            font-size: clamp(10px, 0.9vw, 12px);
                            font-weight: 700;
                            letter-spacing: 0.08em;
                            text-transform: uppercase;
                            padding: 4px 12px;
                            border-radius: 20px;
                            width: fit-content;
                        }

                        .dashboard-title {
                            color: white;
                            font-size: clamp(20px, 2.4vw, 36px);
                            font-weight: 700;
                            letter-spacing: -0.4px;
                            line-height: 1.15;
                            margin: 0;
                        }

                        .dashboard-desc {
                            color: rgba(255,255,255,0.6);
                            font-size: clamp(13px, 1.1vw, 16px);
                            line-height: 1.6;
                            margin: 0;
                        }

                        .slide-cta {
                            display: inline-flex;
                            align-items: center;
                            gap: 8px;
                            background: linear-gradient(to right, #FFD700, #FF8C00);
                            color: #0d1b4b;
                            font-size: clamp(12px, 1vw, 15px);
                            font-weight: 700;
                            padding: clamp(9px, 1.2vh, 13px) clamp(16px, 1.5vw, 24px);
                            border-radius: 50px;
                            border: none;
                            cursor: pointer;
                            width: fit-content;
                            margin-top: 4px;
