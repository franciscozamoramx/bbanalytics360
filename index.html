        // ==================== AIRTABLE LOGGER COMPLETO ====================
        const LOGGING_ENABLED = true;
        let currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let userIP = null;

        // CONFIGURACIÓN AIRTABLE
        const AIRTABLE_CONFIG = {
            baseId: 'appyLYRPaDHgHRMfg',
            apiKey: 'patotjwpztoSwMBKc.19277efd2f0944e48d327235c5ecd969e1ece9b46543924225445a24d0992e23',
            tableName: 'Table 1'
        };

        class AirtableLogger {
            constructor() {
                this.pendingLogs = [];
                this.isOnline = navigator.onLine;
                
                // Obtener IP del usuario
                this.getUserIP();
                
                this.init();
            }
            
            async init() {
                // Detectar conexión
                window.addEventListener('online', () => {
                    this.isOnline = true;
                    this.flushPendingLogs();
                });
                
                window.addEventListener('offline', () => {
                    this.isOnline = false;
                });
                
                // Cargar pendientes
                this.loadPendingLogs();
                
                // Sincronizar cada 30 segundos
                setInterval(() => this.flushPendingLogs(), 30000);
                
                console.log('✅ Logger Airtable inicializado');
            }
            
            // Obtener IP del usuario (no bloqueante, con timeout de 3s)
            getUserIP() {
                const timeout = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('timeout')), 3000)
                );
                Promise.race([
                    fetch('https://api.ipify.org?format=json').then(r => r.json()),
                    timeout
                ])
                .then(data => {
                    userIP = data.ip;
                    console.log('🌐 IP obtenida:', userIP);
                })
                .catch(() => {
                    userIP = 'IP no disponible';
                    console.warn('No se pudo obtener IP externa');
                });
            }
            
            // Detectar tipo de dispositivo
            detectDeviceType() {
                const userAgent = navigator.userAgent.toLowerCase();
                const screenWidth = window.screen.width;
                
                if (/mobile|android|iphone|ipad|ipod/.test(userAgent)) {
                    if (screenWidth >= 768) {
                        return 'tablet';
                    }
                    return 'mobile';
                }
                
                if (screenWidth >= 768 && screenWidth <= 1024) {
                    if (/android|ipad/.test(userAgent)) {
                        return 'tablet';
                    }
                }
                
                return 'desktop';
            }
            
            // Registrar evento
            async log(action, dashboard = null, user = null, extraData = {}) {
                const logEntry = {
                    id: 'log_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    timestamp: new Date().toISOString(),
                    fechaHoraLocal: new Date().toLocaleString('es-MX'),
                    user: user || currentUser || 'anonymous',
                    action: action,
                    dashboard: dashboard,
                    dashboardName: dashboard ? dashboardNames[dashboard] : null,
                    deviceType: this.detectDeviceType(),
                    screen: `${window.screen.width}x${window.screen.height}`,
                    userAgent: navigator.userAgent,
                    ip: userIP || 'Obteniendo...',
                    sessionId: currentSessionId,
                    extraData: extraData
                };
                
                console.log('📝 Registrando:', {
                    usuario: logEntry.user,
                    accion: logEntry.action,
                    dashboard: logEntry.dashboardName,
                    dispositivo: logEntry.deviceType,
                    ip: logEntry.ip,
                    extra: extraData
                });
                
                // 1. Guardar localmente
                this.saveToLocalStorage(logEntry);
                
                // 2. Intentar enviar a Airtable
                if (this.isOnline) {
                    try {
                        await this.sendToAirtable(logEntry);
                        console.log('✅ Log enviado a Airtable');
                    } catch (error) {
                        console.warn('⚠️ Error Airtable, guardando pendiente:', error.message);
                        this.saveAsPending(logEntry);
                    }
                } else {
                    this.saveAsPending(logEntry);
                    console.log('📦 Log guardado como pendiente (offline)');
                }
                
                return logEntry;
            }
            
            // Enviar a Airtable - CON NOMBRES EXACTOS DE CAMPOS
            async sendToAirtable(logEntry) {
                const airtableRecord = {
                    fields: {
                        "FechaHora": logEntry.timestamp,
                        "Usuario": logEntry.user,
                        "Accion": logEntry.action,
                        "Dashboard": logEntry.dashboard || '',
                        "DashboardNombre": logEntry.dashboardName || '',
                        "Dispositivo": logEntry.deviceType,
                        "IP": logEntry.ip,
                        "UserAgent": logEntry.userAgent.substring(0, 300),
                        "SesionID": logEntry.sessionId
                    }
                };
                
                const url = `https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableName}`;
                
                console.log('Enviando a Airtable:', airtableRecord.fields);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(airtableRecord)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Error Airtable:', response.status, errorText);
                    throw new Error(`Airtable error ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('✅ Airtable response:', result);
                return result;
            }
            
            // Guardar en localStorage
            saveToLocalStorage(logEntry) {
                try {
                    const key = 'bi_logs_local';
                    let logs = JSON.parse(localStorage.getItem(key) || '[]');
                    logs.push(logEntry);
                    
                    if (logs.length > 1000) {
                        logs = logs.slice(-1000);
                    }
                    
                    localStorage.setItem(key, JSON.stringify(logs));
                } catch (error) {
                    console.error('Error guardando local:', error);
                }
            }
            
            // Guardar como pendiente
            saveAsPending(logEntry) {
                try {
                    const key = 'bi_logs_pending';
                    let pending = JSON.parse(localStorage.getItem(key) || '[]');
                    pending.push({ 
                        ...logEntry, 
                        retries: 0
                    });
                    
                    if (pending.length > 200) {
                        pending = pending.slice(-200);
                    }
                    
                    localStorage.setItem(key, JSON.stringify(pending));
                } catch (error) {
                    console.error('Error guardando pendiente:', error);
                }
            }
            
            // Sincronizar pendientes
            async flushPendingLogs() {
                if (!this.isOnline) return;
                
                const pendingKey = 'bi_logs_pending';
                let pending = JSON.parse(localStorage.getItem(pendingKey) || '[]');
                
                if (pending.length === 0) return;
                
                console.log(`🔄 Sincronizando ${pending.length} logs pendientes...`);
                
                const remaining = [];
                
                for (let i = 0; i < pending.length; i++) {
                    const logEntry = pending[i];
                    
                    try {
                        await this.sendToAirtable(logEntry);
                        console.log(`✅ Pendiente ${i+1} enviado`);
                    } catch (error) {
                        logEntry.retries = (logEntry.retries || 0) + 1;
                        
                        if (logEntry.retries <= 3) {
                            remaining.push(logEntry);
                        }
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                localStorage.setItem(pendingKey, JSON.stringify(remaining));
                console.log(`✅ Sincronizados, ${remaining.length} aún pendientes`);
            }
            
            loadPendingLogs() {
                try {
                    const pending = JSON.parse(localStorage.getItem('bi_logs_pending') || '[]');
                    console.log(`📦 ${pending.length} logs pendientes cargados`);
                } catch (error) {
                    console.error('Error cargando pendientes:', error);
                }
            }
            
            // Exportar logs locales
            exportLocalLogs() {
                try {
                    const localLogs = JSON.parse(localStorage.getItem('bi_logs_local') || '[]');
                    const pendingLogs = JSON.parse(localStorage.getItem('bi_logs_pending') || '[]');
                    
                    const allLogs = [...localLogs, ...pendingLogs];
                    
                    if (allLogs.length === 0) {
                        alert('No hay logs locales');
                        return;
                    }
                    
                    const headers = ['FechaHora', 'Usuario', 'Accion', 'Dashboard', 'DashboardNombre', 'Dispositivo', 'IP', 'SesionID', 'UserAgent'];
                    let csv = headers.join(';') + '\n';
                    
                    allLogs.forEach(log => {
                        const row = [
                            `"${log.timestamp}"`,
                            `"${log.user}"`,
                            `"${log.action}"`,
                            `"${log.dashboard || ''}"`,
                            `"${log.dashboardName || ''}"`,
                            `"${log.deviceType}"`,
                            `"${log.ip || ''}"`,
                            `"${log.sessionId}"`,
                            `"${log.userAgent || ''}"`
                        ];
                        csv += row.join(';') + '\n';
                    });
                    
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `bb-analytics-logs-${new Date().toISOString().split('T')[0]}.csv`;
                    document.body.appendChild(a);

                // Teclas F1-F12

                    e.preventDefault();

                // Ctrl+Shift+I (DevTools)
                if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
                    e.preventDefault();

                // F12 (DevTools)
                if (e.keyCode === 123) {
                    e.preventDefault();

                if (e.ctrlKey && e.keyCode === 85) {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+Shift+C (Inspector)
                if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
                    e.preventDefault();

        // Función para cargar los permisos desde el JSON
        async function loadPermissions() {
            const CACHE_KEY = 'bb_permissions_cache';
            const CACHE_TTL = 5 * 60 * 1000; // 5 minutos en ms

            // ✅ CAMBIO 2: Usar caché de sessionStorage para evitar fetch en cada visita
            try {
                const cached = sessionStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_TTL && data.users) {
                        permissionsData = data;
                        console.log('✅ Permisos cargados desde caché');
                        showStatus('Permisos cargados correctamente', 'success');
                        setTimeout(hideStatus, 2000);
                        return;
                    }
                }
            } catch (e) {
                console.warn('Error leyendo caché, se cargará desde red:', e);
            }

            try {
                // Usar la ruta absoluta de GitHub Pages (sin cache-busting: el sessionStorage lo maneja)
                const jsonUrl = 'https://raw.githubusercontent.com/franciscozamoramx/bbanalytics360/refs/heads/main/PERMISSION_FILES_BI/permissions.json';
                
                console.log('Cargando permisos desde red:', jsonUrl);
                
                const response = await fetch(jsonUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                
                if (!text.trim()) {
                    throw new Error('El archivo JSON está vacío');
                }
                
                const data = JSON.parse(text);
                
                if (!data.users) {
                    throw new Error('Estructura de JSON inválida: falta propiedad "users"');
                }
                
                permissionsData = data;

                // Guardar en caché
                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }));
                } catch (e) {
                    console.warn('No se pudo guardar caché de permisos:', e);
                }

                console.log('Permisos cargados correctamente desde GitHub Pages', permissionsData);
                showStatus('Permisos cargados correctamente', 'success');
                setTimeout(hideStatus, 2000);
                
            } catch (error) {
                console.error('Error al cargar permisos:', error);
                
                let errorMessage = 'Error cargando permisos: ' + error.message;
                
                permissionsData = defaultPermissions;
                showStatus('Usando permisos por defecto - ' + errorMessage, 'error');
                console.log('Permisos por defecto cargados:', permissionsData);
            }
        }

                statusElement.classList.add('status-error');
            } else if (type === 'loading') {
                statusElement.classList.add('status-loading');
            }
            
            statusElement.style.display = 'block';

                return;

                showStatus('Error: Los permisos no se han cargado correctamente. Intenta nuevamente.', 'error');
                return;
            }
            
            if (permissionsData.users && permissionsData.users[email]) {
                currentUser = email;
                currentUserPermissions = permissionsData.users[email].dashboards || [];
                currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                // ✅ CAMBIO 3: Fire-and-forget — no bloquea la apertura del dashboard
                logger.log('login', null, currentUser);

                document.getElementById('userInfo').style.display = 'block';

                console.log('Lista de dashboards:', currentUserPermissions);
                console.log('Session ID:', currentSessionId);

                setupMobileCarruselEvents();

            // 🔧 CONFIGURAR EVENTOS DEL CARRUSEL MÓVIL
            function setupMobileCarruselEvents() {
                const prevBtn = document.querySelector('.carrusel-prev');
                const nextBtn = document.querySelector('.carrusel-next');
                const indicators = document.querySelectorAll('.carrusel-indicator');
                const slideImages = document.querySelectorAll('.carrusel-slide img');

                if (prevBtn) prevBtn.addEventListener('click', showMobilePrevSlide);
                if (nextBtn) nextBtn.addEventListener('click', showMobileNextSlide);

                indicators.forEach(indicator => {
                    indicator.addEventListener('click', function() {
                        goToMobileSlide(parseInt(this.getAttribute('data-index')));
                    });
                });

                // Click en imagen
                slideImages.forEach(img => {
                    img.addEventListener('click', async function() {
                        const dashboardKey = this.getAttribute('data-key');
                        if (dashboardKey && dashboardUrls[dashboardKey]) {
                            await logger.log('dashboard_view', dashboardKey, currentUser, {
                                source: 'mobile_carrusel_click',
                                timestamp: new Date().toISOString()
                            });
                            loadMobileDashboard(dashboardUrls[dashboardKey], dashboardKey);
                        }
                    });
                });

                // Click en botón CTA
                document.querySelectorAll('.mobile-slide-cta').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const dashboardKey = this.getAttribute('data-key');
                        if (dashboardKey && dashboardUrls[dashboardKey]) {
                            await logger.log('dashboard_view', dashboardKey, currentUser, {
                                source: 'mobile_cta_click',
                                timestamp: new Date().toISOString()
                            });
                            loadMobileDashboard(dashboardUrls[dashboardKey], dashboardKey);
                        }
                    });
                });
            }
            
            // 🔧 FUNCIONES DE CONTROL DEL CARRUSEL MÓVIL
            function showMobileNextSlide() {
                currentMobileSlide = (currentMobileSlide + 1) % mobileCarruselData.length;
                updateMobileCarrusel();
            }
            
            function showMobilePrevSlide() {
                currentMobileSlide = (currentMobileSlide - 1 + mobileCarruselData.length) % mobileCarruselData.length;
                updateMobileCarrusel();
            }
            
            function goToMobileSlide(index) {
                currentMobileSlide = index;
                updateMobileCarrusel();
            }
            
            function updateMobileCarrusel() {
                const slides = document.querySelectorAll('.carrusel-slide');
                const indicators = document.querySelectorAll('.carrusel-indicator');

                slides.forEach(slide => slide.classList.remove('active'));
                indicators.forEach(indicator => indicator.classList.remove('active'));

                if (slides[currentMobileSlide]) slides[currentMobileSlide].classList.add('active');
                if (indicators[currentMobileSlide]) indicators[currentMobileSlide].classList.add('active');

                const counter = document.getElementById('mobileSlideCounter');
                if (counter) counter.textContent = `${currentMobileSlide + 1} / ${mobileCarruselData.length}`;
            }
            
            function startMobileAutoPlay() {
                if (mobileIsAutoPlay) {
                    mobileAutoPlayInterval = setInterval(showMobileNextSlide, 5000);
                }
            }
            
            // 🔒 Bloquear clic derecho SOLO en el menú móvil
            mobileSidebar.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            function openWhatsApp() {
                const phoneNumber = '+524421974414';
                const message = 'Hola, necesito ayuda en BB Analytics 360';
                const url = 'https://wa.me/' + phoneNumber + '?text=' + encodeURIComponent(message);
                window.open(url, '_blank');
            }
            
            function toggleMobileSidebar() {
                isSidebarOpen = !isSidebarOpen;
                mobileSidebar.classList.toggle('active');
                mobileOverlay.classList.toggle('active');
                mobileIframeContainer.classList.toggle('sidebar-open');
            }

            // Función global para el árbol de áreas móvil
            window.toggleMobileArea = function(idx) {
                const children = document.getElementById('mobile-area-children-' + idx);
                const chevron = document.getElementById('mobile-chevron-' + idx);
                if (!children) return;
                const isOpen = children.classList.contains('open');
                children.classList.toggle('open', !isOpen);
                if (chevron) chevron.classList.toggle('open', !isOpen);
            };
            
            function loadMobileDashboard(dashboardUrl, dashboardKey) {
                mobileIframeLoading.style.display = 'block';

                // Si es el carrusel
                if (dashboardUrl === 'carrusel_integrado') {
                    initMobileCarrusel();
                    mobileIframeLoading.style.display = 'none';
                    mobileMenuItems.forEach(menuItem => {
                        menuItem.classList.remove('active');
                        if (menuItem.getAttribute('data-src') === 'carrusel_integrado') menuItem.classList.add('active');
                    });
                    return;
                }

                if (!dashboardUrl || dashboardUrl === '#') return;

                // Ocultar sidebar
                if (isSidebarOpen) toggleMobileSidebar();

                // Detener carrusel si estaba activo
                if (mobileAutoPlayInterval) {
                    clearInterval(mobileAutoPlayInterval);
                    mobileAutoPlayInterval = null;
                }

                // Si el reporte tiene URL de PBI Service configurada, abrir ahí
                const mobileServiceUrl = dashboardMobileUrls[dashboardKey];
                if (mobileServiceUrl) {
                    mobileIframeLoading.style.display = 'none';
                    _showOpenInServiceToast(mobileServiceUrl, dashboardUrl, dashboardKey);
                    return;
                }

                // Fallback: iframe normal
                mobileContentContainer.style.display = 'block';
                let iframe = document.getElementById('mobileIframe');
                if (!iframe) {
                    mobileContentContainer.innerHTML = '<iframe class="mobile-iframe" id="mobileIframe" frameborder="0" allowfullscreen="true" allow="fullscreen"></iframe>';
                    iframe = document.getElementById('mobileIframe');
                }

                iframe.onload = function() {
                    mobileIframeLoading.style.display = 'none';
                    showRotateHint();
                };

                iframe.src = dashboardUrl;
            }

            function _showOpenInServiceToast(serviceUrl, embedUrl, dashboardKey) {
                var prev = document.getElementById('pbiServiceToast');
                if (prev) prev.remove();

                var dashName = dashboardNames[dashboardKey] || dashboardKey;

                var toast = document.createElement('div');
                toast.id = 'pbiServiceToast';
                toast.style.position = 'fixed';
                toast.style.bottom = '0';
                toast.style.left = '0';
                toast.style.right = '0';
                toast.style.zIndex = '9999';
                toast.style.background = '#152c6e';
                toast.style.borderTop = '2px solid #FFD700';
                toast.style.padding = '16px 20px';
                toast.style.display = 'flex';
                toast.style.flexDirection = 'column';
                toast.style.gap = '12px';
                toast.style.boxShadow = '0 -4px 20px rgba(0,0,0,0.4)';

                var title = document.createElement('p');
                title.style.cssText = 'color:white;font-size:14px;font-weight:600;margin:0;';
                title.textContent = dashName;

                var desc = document.createElement('p');
                desc.style.cssText = 'color:rgba(255,255,255,0.8);font-size:12px;margin:0;line-height:1.5;';
                desc.textContent = 'Este dashboard tiene vista optimizada para movil.';

                var btnRow = document.createElement('div');
                btnRow.style.cssText = 'display:flex;gap:10px;';

                var btnVertical = document.createElement('button');
                btnVertical.id = 'pbiOpenService';
                btnVertical.style.cssText = 'flex:1;padding:11px;background:linear-gradient(to right,#FFD700,#FF8C00);color:#152c6e;font-weight:700;font-size:13px;border:none;border-radius:50px;cursor:pointer;';
                btnVertical.textContent = 'Vista vertical';

                var btnEmbed = document.createElement('button');
                btnEmbed.id = 'pbiOpenEmbed';
                btnEmbed.style.cssText = 'flex:1;padding:11px;background:rgba(255,255,255,0.1);color:white;font-weight:600;font-size:13px;border:1px solid rgba(255,255,255,0.3);border-radius:50px;cursor:pointer;';
                btnEmbed.textContent = 'Ver aqui';

                btnRow.appendChild(btnVertical);
                btnRow.appendChild(btnEmbed);
                toast.appendChild(title);
                toast.appendChild(desc);
                toast.appendChild(btnRow);
                document.body.appendChild(toast);

                btnVertical.addEventListener('click', function() {
                    toast.remove();
                    window.location.href = serviceUrl;
                });

                btnEmbed.addEventListener('click', function() {
                    toast.remove();
                    mobileContentContainer.style.display = 'block';
                    var iframe = document.getElementById('mobileIframe');
                    if (!iframe) {
                        mobileContentContainer.innerHTML = '<iframe class="mobile-iframe" id="mobileIframe" frameborder="0" allowfullscreen="true" allow="fullscreen"></iframe>';
                        iframe = document.getElementById('mobileIframe');
                    }
                    iframe.onload = function() { showRotateHint(); };
                    iframe.src = embedUrl;
                });
            }
            // 🚪 FUNCIÓN SIMPLIFICADA PARA REGISTRAR LOGOUT MÓVIL
            async function registerMobileLogout() {
                try {
                    console.log('🚪 Registrando logout móvil por botón');
                    
                    // Enviar al logger
                    await logger.log('logout', null, currentUser, { 
                        logoutType: 'button_click',
                        device: 'mobile',
                        timestamp: new Date().toISOString()
                    });
                    
                    return true;
                    
                } catch (error) {
                    console.error('Error registrando logout móvil:', error);
                    return false;
                }
            }
            
            mobileToggleBtn.addEventListener('click', toggleMobileSidebar);
            mobileOverlay.addEventListener('click', toggleMobileSidebar);
            
            mobileMenuItems.forEach(item => {
                item.addEventListener('click', async function() {
                    const dashboardUrl = this.getAttribute('data-src');
                    
                    if (dashboardUrl) {
                        // Obtener qué dashboard se está accediendo
                        const dashboardKey = Object.keys(dashboardUrls).find(key => 
                            dashboardUrls[key] === dashboardUrl
                        ) || (dashboardUrl === 'carrusel_integrado' ? 'principal' : null);
                        
                        // Actualizar estado activo
                        mobileMenuItems.forEach(menuItem => {
                            menuItem.classList.remove('active');
                        });
                        this.classList.add('active');
                        
                        // Registrar acceso si no es el carrusel
                        if (dashboardKey && dashboardKey !== 'principal') {
                            await logger.log('dashboard_view', dashboardKey, currentUser, {
                                source: 'mobile_menu_click',
                                timestamp: new Date().toISOString()
                            });
                        }
                        
                        // Cargar dashboard
                        loadMobileDashboard(dashboardUrl, dashboardKey);
                    }
                });
            });
            
            mobileWhatsappBtn.addEventListener('click', function() {
                openWhatsApp();
            });
            
            // Botón de cerrar sesión
            mobileExitBtn.addEventListener('click', async function() {
                if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                    await registerMobileLogout();
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                }
            });

            // 📱 MOSTRAR HINT DE ROTACIÓN EN PORTRAIT
            let _rotateCheckInterval = null;

            function showRotateHint() {
                const isPortrait = window.innerHeight > window.innerWidth;
                if (!isPortrait) return;

                _doShowHint();

                // Verificar cada 10s si sigue en portrait; si es así, volver a mostrar
                if (_rotateCheckInterval) clearInterval(_rotateCheckInterval);
                _rotateCheckInterval = setInterval(() => {
                    const stillPortrait = window.innerHeight > window.innerWidth;
                    if (stillPortrait) {
                        _doShowHint();
                    } else {
                        clearInterval(_rotateCheckInterval);
                        _rotateCheckInterval = null;
                    }
                }, 10000);
            }

            function _doShowHint() {
                const existing = document.getElementById('rotateHint');
                if (existing) existing.remove();

                const hint = document.createElement('div');
                hint.id = 'rotateHint';
                hint.innerHTML = `
                    <svg class="rotate-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
                        style="width:32px;height:32px;">
                        <!-- Teléfono en vertical girando a horizontal -->
                        <g fill="#FFD700">
                            <!-- cuerpo del teléfono en horizontal -->
                            <rect x="18" y="35" width="54" height="30" rx="5" ry="5"/>
                            <!-- pantalla -->
                            <rect x="23" y="40" width="40" height="20" rx="2" ry="2" fill="#0d1b4b"/>
                            <!-- botón derecho -->
                            <circle cx="68" cy="50" r="3"/>
                            <!-- flecha de rotación curva arriba -->
                            <path d="M50 18 C65 18, 76 28, 76 35" stroke="#FFD700" stroke-width="4" fill="none" stroke-linecap="round"/>
                            <polygon points="74,22 80,35 68,33" fill="#FFD700"/>
                        </g>
                    </svg>
                    <span class="rotate-text">Gira a vista horizontal</span>
                `;
                document.body.appendChild(hint);

                // Desaparecer tras 4 segundos
                setTimeout(() => {
                    const el = document.getElementById('rotateHint');
                    if (el) {
                        el.classList.add('hiding');
                        setTimeout(() => el.remove(), 400);
                    }
                }, 4000);
            }

            // Manejar redirect de vuelta de MSAL (si venimos de un login)
            // Inicializar carrusel automáticamente
            initMobileCarrusel();
        }

                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" style="width:13px;height:13px;fill:#FFD700;vertical-align:middle;margin-right:4px;"><path d="M224 256A128 128 0 1 0 224 0a128 128 0 1 0 0 256zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3zm339-78.7c9.4-9.4 9.4-24.6 0-33.9l-48-48c-9.4-9.4-24.6-9.4-33.9 0l-80 80c-9.4 9.4-9.4 24.6 0 33.9l48 48c9.4 9.4 24.6 9.4 33.9 0l80-80z"/></svg> Cargando información de usuario...

                    <script>
                        // 🔧 VARIABLES GLOBALES PARA ESTE SCRIPT
                        const dashboardUrls = ${dashboardUrlsJson};
                        const dashboardNames = ${dashboardNamesJson};
                        const dashboardIcons = ${dashboardIconsJson};
                        const dashboardImages = ${dashboardImagesJson};
                        const dashboardDescriptions = ${dashboardDescriptionsJson};
                        const currentUser = "${currentUser}";
                        const currentUserPermissions = ${currentUserPermissionsJson};
                        const currentSessionId = "${currentSessionId}";
                        
                        // Variables para control del carrusel

                        let autoPlayInterval;

                        let carruselData = [];
                        
                        // Variable global para controlar logout
                        window.logoutRegistered = false;
                        
                        // 🔧 FUNCIÓN PARA GENERAR LOS DATOS DEL CARRUSEL
                        function generateCarruselData() {
                            const data = [];
                            
                            // Para cada dashboard permitido, crear una diapositiva
                            currentUserPermissions.forEach(dashboardKey => {
                                if (dashboardKey !== 'diccionario' && dashboardUrls[dashboardKey]) {
                                    const imageUrl = dashboardImages[dashboardKey] || 'https://i.postimg.cc/QCN4dPG1/analisis-de-datos.png';
                                    const description = dashboardDescriptions[dashboardKey] || 'Dashboard de Business Intelligence';
                                    
                                    data.push({
                                        key: dashboardKey,
                                        title: dashboardNames[dashboardKey],
                                        image: imageUrl,
                                        description: description,
                                        icon: dashboardIcons[dashboardKey],
                                        url: dashboardUrls[dashboardKey]
                                    });
                                }
                            });
                            
                            return data;
                        }
                        
                        // 🔧 FUNCIÓN PARA INICIALIZAR EL CARRUSEL
                        function initCarrusel() {
                            carruselData = generateCarruselData();
                            
                            // Actualizar información de permisos
                            const permissionInfo = document.getElementById('carruselPermissionInfo');
                            if (permissionInfo) {
                                permissionInfo.innerHTML = \`
                                    <i class="fas fa-user-check"></i> Usuario: \${currentUser} | 
                                    <i class="fas fa-chart-bar"></i> Dashboards disponibles: \${carruselData.length}
                                \`;
                            }
                            
                            // Si no hay dashboards permitidos, mostrar mensaje
                            if (carruselData.length === 0) {
                                document.getElementById('contentContainer').innerHTML = \`
                                    <div style="text-align: center; color: white; padding: 40px;">
                                        <i class="fas fa-exclamation-triangle" style="font-size: 60px; margin-bottom: 20px; color: #FFD700;"></i>

                                        <p style="font-size: 16px; margin-top: 20px; color: #FFD700;">
                                            Contacta al administrador para solicitar acceso.
                                        </p>
                                    </div>
                                \`;
                                return;
                            }
                            
                            // Mapeo de áreas por dashboard key
                            const areaLabels = {
                                adt:'Productos', desempeno:'Productos', rtp:'Productos', aforo:'Productos',
                                auditoria:'Auditoría', seguimiento_auditores:'Auditoría', promociones:'Auditoría',
                                bigplayers:'Comercial', bolipoits:'Comercial',
                                ingreso_tarjetas:'Finanzas',
                                inventario:'TI', proyectos:'TI', logs_bi:'TI',
                                principal:'Inicio'
                            };

                            // Generar HTML del carrusel - layout 2 columnas
                            const slidesHTML = carruselData.map((slide, index) => \`
                                <div class="carrusel-slide \${index === 0 ? 'active' : ''}" data-index="\${index}">
                                    <div class="slide-image-panel">
                                        <img src="\${slide.image}" alt="\${slide.title}" data-key="\${slide.key}">
                                    </div>
                                    <div class="slide-info-panel">
                                        <span class="slide-area-badge">
                                            <i class="\${slide.icon}" style="font-size:10px;"></i>
                                            \${areaLabels[slide.key] || 'Dashboard'}
                                        </span>
                                        <div class="dashboard-title">\${slide.title}</div>
                                        <div class="dashboard-desc">\${slide.description}</div>
                                        <button class="slide-cta" data-key="\${slide.key}">
                                            <i class="fas fa-arrow-right" style="font-size:12px;"></i>
                                            Abrir dashboard
                                        </button>
                                    </div>
                                </div>
                            \`).join('');

                            const indicatorsHTML = carruselData.map((_, index) => \`
                                <div class="carrusel-indicator \${index === 0 ? 'active' : ''}" data-index="\${index}"></div>
                            \`).join('');

                            document.getElementById('carruselSlider').innerHTML = \`
                                <button class="carrusel-nav carrusel-prev">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button class="carrusel-nav carrusel-next">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                                \${slidesHTML}
                                <div class="carrusel-indicators">
                                    \${indicatorsHTML}
                                </div>
                                <span class="slide-counter" id="slideCounter">1 / \${carruselData.length}</span>
                            \`;
                            
                            // Crear imágenes de preview (anterior y siguiente)
                            createPreviewImages();
                            
                            // Inicializar eventos del carrusel
                            setupCarruselEvents();
                            startAutoPlay();
                            
                            // Actualizar imágenes de preview
                            updatePreviewImages();
                        }
                        
                        // 🔧 FUNCIÓN PARA CREAR IMÁGENES DE PREVIO/SIGUIENTE
                        function createPreviewImages() {
                            const carruselSlider = document.getElementById('carruselSlider');
                            
                            // Crear imagen para dashboard anterior
                            const previewPrev = document.createElement('img');
                            previewPrev.className = 'preview-images preview-prev';
                            previewPrev.alt = 'Dashboard anterior';
                            
                            // Crear imagen para dashboard siguiente
                            const previewNext = document.createElement('img');
                            previewNext.className = 'preview-images preview-next';
                            previewNext.alt = 'Dashboard siguiente';
                            
                            // Agregar al carrusel
                            carruselSlider.appendChild(previewPrev);
                            carruselSlider.appendChild(previewNext);
                        }
                        
                        // 🔧 FUNCIÓN PARA ACTUALIZAR IMÁGENES DE PREVIO/SIGUIENTE
                        function updatePreviewImages() {
                            const previewPrev = document.querySelector('.preview-prev');
                            const previewNext = document.querySelector('.preview-next');
                            
                            if (!previewPrev || !previewNext || carruselData.length === 0) return;
                            
                            // Calcular índices de anterior y siguiente
                            const prevIndex = (currentSlide - 1 + carruselData.length) % carruselData.length;
                            const nextIndex = (currentSlide + 1) % carruselData.length;
                            
                            // Actualizar imágenes
                            if (carruselData[prevIndex]) {
                                previewPrev.src = carruselData[prevIndex].image;
                                previewPrev.style.opacity = '0.6';
                            }
                            
                            if (carruselData[nextIndex]) {
                                previewNext.src = carruselData[nextIndex].image;
                                previewNext.style.opacity = '0.6';
                            }
                        }
                        
                        // 🔧 FUNCIÓN PARA CONFIGURAR EVENTOS DEL CARRUSEL
                        function setupCarruselEvents() {
                            const prevBtn = document.querySelector('.carrusel-prev');
                            const nextBtn = document.querySelector('.carrusel-next');
                            const indicators = document.querySelectorAll('.carrusel-indicator');
                            const slideImages = document.querySelectorAll('.carrusel-slide img');
                            
                            if (prevBtn) prevBtn.addEventListener('click', showPrevSlide);
                            if (nextBtn) nextBtn.addEventListener('click', showNextSlide);
                            
                            indicators.forEach(indicator => {
                                indicator.addEventListener('click', function() {
                                    const index = parseInt(this.getAttribute('data-index'));
                                    goToSlide(index);
                                });
                            });
                            
                            // Click en imagen
                            slideImages.forEach(img => {
                                img.addEventListener('click', function() {
                                    const dashboardKey = this.getAttribute('data-key');
                                    if (dashboardKey && dashboardUrls[dashboardKey]) {
                                        if (window.opener && !window.opener.closed) {
                                            window.opener.postMessage({
                                                type: 'dashboard_access',
                                                dashboardKey: dashboardKey,
                                                user: currentUser,
                                                sessionId: currentSessionId,
                                                timestamp: new Date().toISOString(),
                                                dashboardName: dashboardNames[dashboardKey] || dashboardKey,
                                                action: 'dashboard_view'
                                            }, '*');
                                        }
                                        loadDashboard(dashboardUrls[dashboardKey], dashboardKey);
                                    }
                                });
                                img.addEventListener('mouseenter', function() {
                                    if (autoPlayInterval) { clearInterval(autoPlayInterval); isAutoPlay = false; }
                                });
                                img.addEventListener('mouseleave', function() {
                                    if (!isAutoPlay) { isAutoPlay = true; startAutoPlay(); }
                                });
                            });

                            // Click en botón CTA
                            document.querySelectorAll('.slide-cta').forEach(btn => {
                                btn.addEventListener('click', function() {
                                    const dashboardKey = this.getAttribute('data-key');
                                    if (dashboardKey && dashboardUrls[dashboardKey]) {
                                        if (window.opener && !window.opener.closed) {
                                            window.opener.postMessage({
                                                type: 'dashboard_access',
                                                dashboardKey: dashboardKey,
                                                user: currentUser,
                                                sessionId: currentSessionId,
                                                timestamp: new Date().toISOString(),
                                                dashboardName: dashboardNames[dashboardKey] || dashboardKey,
                                                action: 'dashboard_view'
                                            }, '*');
                                        }
                                        loadDashboard(dashboardUrls[dashboardKey], dashboardKey);
                                    }
                                });
                            });
                        }
                        
                        // 🔧 FUNCIONES DE CONTROL DEL CARRUSEL
                        function showNextSlide() {
                            currentSlide = (currentSlide + 1) % carruselData.length;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function showPrevSlide() {
                            currentSlide = (currentSlide - 1 + carruselData.length) % carruselData.length;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function goToSlide(index) {
                            currentSlide = index;
                            updateCarrusel();
                            updatePreviewImages();
                        }
                        
                        function updateCarrusel() {
                            const slides = document.querySelectorAll('.carrusel-slide');
                            const indicators = document.querySelectorAll('.carrusel-indicator');

                            slides.forEach(slide => slide.classList.remove('active'));
                            indicators.forEach(indicator => indicator.classList.remove('active'));

                            if (slides[currentSlide]) slides[currentSlide].classList.add('active');
                            if (indicators[currentSlide]) indicators[currentSlide].classList.add('active');

                            const counter = document.getElementById('slideCounter');
                            if (counter) counter.textContent = \`\${currentSlide + 1} / \${carruselData.length}\`;
                        }
                        
                        function startAutoPlay() {
                            if (isAutoPlay && carruselData.length > 1) {
                                autoPlayInterval = setInterval(showNextSlide, 5000);
                            }
                        }
                        
                        // ✅ FUNCIÓN PARA CARGAR DASHBOARD
                        function loadDashboard(dashboardUrl, dashboardKey) {
                            const iframeLoading = document.getElementById('iframeLoading');
                            const contentContainer = document.getElementById('contentContainer');
                            const menuItems = document.querySelectorAll('.menu-item');
                            
                            // Mostrar loading
                            iframeLoading.style.display = 'block';
                            
                            // Si es el carrusel
                            if (dashboardUrl === 'carrusel_integrado') {
                                // Reconstruir el carrusel completamente
                                contentContainer.innerHTML = \`
                                    <div class="carrusel-header">
                                        <h1 class="carrusel-title">BB <span>Analytics 360</span> <span style="font-size:14px;font-weight:400;color:rgba(255,215,0,0.7);margin-left:6px;">V1.73</span></h1>
                                        <div class="carrusel-permission-info" id="carruselPermissionInfo">
                                            <i class="fas fa-user-check"></i> Cargando información...
                                        </div>
                                    </div>
                                    <div class="carrusel-slider" id="carruselSlider">
                                        <div style="text-align:center;color:white;display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;">
                                            <div class="spinner" style="margin:0 auto;"></div>
                                            <p style="color:rgba(255,255,255,0.5);font-size:14px;">Cargando dashboards...</p>
                                        </div>
                                    </div>
                                \`;
                                
                                // Inicializar el carrusel
                                setTimeout(() => {
                                    initCarrusel();
                                    iframeLoading.style.display = 'none';
                                }, 100);
                                
                                // Actualizar menú
                                menuItems.forEach(menuItem => {
                                    menuItem.classList.remove('active');
                                    if (menuItem.getAttribute('data-src') === 'carrusel_integrado') {
                                        menuItem.classList.add('active');
                                    }
                                });
                            } 
                            // Si es un dashboard externo
                            else if (dashboardUrl && dashboardUrl !== '#') {
                                // Detener carrusel si estaba activo
                                if (autoPlayInterval) {
                                    clearInterval(autoPlayInterval);
                                    autoPlayInterval = null;
                                }

                                // Reutilizar iframe existente si ya existe (más rápido que recrearlo)
                                let iframe = document.getElementById('dashboardFrame');
                                if (!iframe) {
                                    contentContainer.innerHTML = \`<iframe
                                        id="dashboardFrame"
                                        frameborder="0"
                                        allowfullscreen="true"
                                        allow="fullscreen"
                                        style="width:100%;height:100%;border:none;"
                                    ></iframe>\`;
                                    iframe = document.getElementById('dashboardFrame');
                                } else {
                                    // Ya existe: solo cambiar el src
                                    iframeLoading.style.display = 'block';
                                }

                                // Timeout de seguridad: si tarda más de 20s mostrar mensaje
                                const loadTimeout = setTimeout(() => {
                                    iframeLoading.style.display = 'none';
                                    const existing = document.getElementById('pbi-error-msg');
                                    if (!existing) {
                                        const msg = document.createElement('div');
                                        msg.id = 'pbi-error-msg';
                                        msg.style.cssText = 'position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#FFD700;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;text-align:center;';
                                        msg.innerHTML = '⚠️ El reporte tardó más de lo esperado. Verifica que tengas acceso en Power BI.';
                                        contentContainer.style.position = 'relative';
                                        contentContainer.appendChild(msg);
                                        setTimeout(() => msg.remove(), 6000);
                                    }
                                }, 20000);

                                // Ocultar loading cuando el iframe cargue
                                iframe.onload = function() {
                                    clearTimeout(loadTimeout);
                                    iframeLoading.style.display = 'none';
                                };

                                iframe.onerror = function() {
                                    clearTimeout(loadTimeout);
                                    iframeLoading.style.display = 'none';
                                };

                                // Asignar src después de configurar eventos
                                iframe.src = dashboardUrl;
                            }
                            
                            // Ocultar sidebar si está abierto
                            const sidebar = document.getElementById('sidebar');
                            const overlay = document.getElementById('overlay');
                            const iframeContainer = document.getElementById('iframeContainer');
                            const toggleBtn = document.getElementById('toggleBtn');
                            if (sidebar && sidebar.classList.contains('active')) {
                                sidebar.classList.remove('active');
                                if (overlay) overlay.classList.remove('active');
                                if (iframeContainer) {
                                    iframeContainer.classList.remove('sidebar-open');
                                }
                                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                            }
                        }
                        
                        // 🚪 FUNCIÓN PARA REGISTRAR LOGOUT EN AIRTABLE
                        function registerLogout() {
                            if (window.logoutRegistered) {
                                console.log('⚠️ Logout ya registrado, ignorando...');
                                return true;
                            }
                            
                            try {
                                console.log('🚪 Registrando logout por botón');
                                
                                // Marcar inmediatamente que ya se registró logout
                                window.logoutRegistered = true;
                                
                                // Crear datos de logout
                                const logoutData = {
                                    user: currentUser,
                                    action: 'logout',
                                    logoutType: 'button_click',
                                    timestamp: new Date().toISOString(),
                                    sessionId: currentSessionId,
                                    deviceType: 'desktop',
                                    registeredAt: Date.now(),
                                    sessionDuration: Date.now() - parseInt(currentSessionId.split('_')[1])
                                };
                                
                                // Enviar mensaje al padre (login page) para logging en Airtable
                                if (window.opener && !window.opener.closed) {
                                    try {
                                        window.opener.postMessage({
                                            type: 'logout',
                                            ...logoutData,
                                            source: 'dashboard_button'
                                        }, '*');
                                        
                                        console.log('📤 Mensaje de logout enviado al padre para Airtable');
                                        
                                    } catch (error) {
                                        console.warn('Error enviando mensaje al padre:', error);
                                        localStorage.setItem('pending_logout', JSON.stringify(logoutData));
                                    }
                                } else {
                                    localStorage.setItem('pending_logout', JSON.stringify(logoutData));
                                }
                                
                                console.log('✅ Logout registrado exitosamente');
                                return true;
                                
                            } catch (error) {
                                console.error('❌ Error registrando logout:', error);
                                return false;
                            }
                        }
                        
                        // 🔹 TOGGLE ÁRBOL DE ÁREAS
                        function toggleArea(idx) {
                            const children = document.getElementById('area-children-' + idx);
                            const chevron = document.getElementById('chevron-' + idx);
                            if (!children) return;
                            const isOpen = children.classList.contains('open');
                            children.classList.toggle('open', !isOpen);
                            if (chevron) chevron.classList.toggle('open', !isOpen);
                        }

                        document.addEventListener('DOMContentLoaded', function() {
                            const toggleBtn = document.getElementById('toggleBtn');
                            const sidebar = document.getElementById('sidebar');
                            const overlay = document.getElementById('overlay');
                            const iframeContainer = document.getElementById('iframeContainer');
                            const menuItems = document.querySelectorAll('.menu-item');
                            const whatsappBtn = document.getElementById('whatsappBtn');
                            const exitBtn = document.getElementById('exitBtn');
                            const iframeLoading = document.getElementById('iframeLoading');
                            const contextMenuMessage = document.getElementById('contextMenuMessage');
                            
                            let isSidebarOpen = false;
                            
                            // 🔒 FUNCIONES DE SEGURIDAD
                            function blockRightClickOnSidebar(e) {
                                e.preventDefault();
                                showContextMenuMessage();
                                return false;
                            }
                            
                            function showContextMenuMessage() {
                                contextMenuMessage.style.display = 'block';
                                setTimeout(() => {
                                    contextMenuMessage.style.display = 'none';
                                }, 3000);
                            }
                            
                            function applySecurityBlocks() {
                                sidebar.addEventListener('contextmenu', blockRightClickOnSidebar);
                            }
                            
                            // 📱 FUNCIONES DE LA APLICACIÓN
                            function openWhatsApp() {
                                const phoneNumber = '+524421974414';
                                const message = 'Hola, necesito ayuda en BB Analytics 360';
                                const url = 'https://wa.me/' + phoneNumber + '?text=' + encodeURIComponent(message);
                                window.open(url, '_blank');
                            }
                            
                            function toggleSidebar() {
                                isSidebarOpen = !isSidebarOpen;
                                sidebar.classList.toggle('active');
                                overlay.classList.toggle('active');
                                iframeContainer.classList.toggle('sidebar-open');
                            }
                            
                            function logout() {
                                if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
                                    // ✅ REGISTRAR LOGOUT POR BOTÓN EN AIRTABLE
                                    const registered = registerLogout();
                                    
                                    if (registered) {
                                        // Cerrar después de un breve delay para permitir el logging
                                        setTimeout(() => {
                                            try {
                                                window.close();
                                            } catch (error) {
                                                console.warn('No se pudo cerrar ventana:', error);
                                                window.location.href = window.opener ? window.opener.location.href : 'about:blank';
                                            }
                                        }, 1000);
                                    } else {
                                        alert('Error registrando logout. La ventana se cerrará de todos modos.');
                                        setTimeout(() => {
                                            try {
                                                window.close();
                                            } catch (error) {
                                                window.location.href = 'about:blank';
                                            }
                                        }, 100);
                                    }
                                }
                            }
                            
                            // 🎯 EVENT LISTENERS
                            toggleBtn.addEventListener('click', toggleSidebar);
                            overlay.addEventListener('click', toggleSidebar);
                            
                            // ✅ CORRECCIÓN: Event listeners para los botones del menú
                            menuItems.forEach(item => {
                                item.addEventListener('click', function() {
                                    const dashboardUrl = this.getAttribute('data-src');
                                    const dashboardKey = Object.keys(dashboardUrls).find(key => 
                                        dashboardUrls[key] === dashboardUrl
                                    ) || (dashboardUrl === 'carrusel_integrado' ? 'principal' : null);
                                    
                                    if (dashboardUrl) {
                                        // Actualizar estado activo
                                        menuItems.forEach(menuItem => {
                                            menuItem.classList.remove('active');
                                        });
                                        this.classList.add('active');
                                        
                                        // Enviar log si no es el carrusel
                                        if (dashboardKey && dashboardKey !== 'principal' && window.opener && !window.opener.closed) {
                                            window.opener.postMessage({
                                                type: 'log_dashboard_view',
                                                dashboardKey: dashboardKey,
                                                user: currentUser,
                                                sessionId: currentSessionId,
                                                timestamp: new Date().toISOString()
                                            }, '*');
                                        }
                                        
                                        // Cargar el dashboard usando la función global loadDashboard
                                        loadDashboard(dashboardUrl, dashboardKey);
                                    }
                                });
                            });
                            
                            // Botón de WhatsApp
                            if (whatsappBtn) {
                                whatsappBtn.addEventListener('click', openWhatsApp);
                            }
                            
                            // Botón de salir
                            exitBtn.addEventListener('click', logout);
                            
                            // 📋 INICIALIZACIÓN
                            applySecurityBlocks();
                            
                            // Inicializar carrusel automáticamente
                            initCarrusel();
                            
                            // Registrar cierre de ventana/pestaña
                            window.addEventListener('beforeunload', function(e) {
                                if (!window.logoutRegistered) {
                                    console.log('⚠️ Ventana cerrada sin logout formal');
                                    
                                    // Intentar registrar como logout automático
                                    if (window.opener && !window.opener.closed) {
                                        window.opener.postMessage({
                                            type: 'logout',
                                            user: currentUser,
                                            action: 'logout',
                                            logoutType: 'window_close',
                                            sessionId: currentSessionId,
                                            timestamp: new Date().toISOString(),
                                            source: 'window_beforeunload'
                                        }, '*');
                                    }
                                }
                            });
                        });
                    <\/script>
                </body>
                </html>
            `;
        }
    </script>

</body></html>
