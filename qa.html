            border-radius: 50px;

            margin: 10px;
            position: relative;
            overflow: hidden;
        }

            background: linear-gradient(to bottom, #FFE600, #FF9E00);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;

            display: block;

        }

            color: white;
            font-size: 16px;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;

            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .form-group .field-icon {
            position: absolute;
            left: 13px;
            bottom: 13px;
            width: 18px;
            height: 18px;
            opacity: 0.4;

            pointer-events: none;
        }

            opacity: 1;
            filter: drop-shadow(0 0 4px #FFD700);
        }

            height: 1px;

        @keyframes divExpand {
            to { transform: scaleX(1); }

        .user-info {
            margin-top: 15px;

        }
        
        .status-message {
            margin-top: 15px;

            font-size: 14px;
        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);
            color: #90EE90;
        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #FFB6C1;
        }
        
        .status-loading {
            background: rgba(255, 255, 0, 0.2);
            color: #FFD700;
