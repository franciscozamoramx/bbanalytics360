            opacity: 0.7;

        }

            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;

        }

            height: 18px;

        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);

        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);

        .status-loading {
