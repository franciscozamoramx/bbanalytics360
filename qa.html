        * {

            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

            align-items: center;
            justify-content: center;
            margin: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to bottom, #FFE600, #FF9E00);
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            text-align: left;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
            outline: none;
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .form-group .field-icon {
            position: absolute;
            left: 13px;
            bottom: 13px;
            width: 18px;
            height: 18px;
            opacity: 0.4;
            transition: opacity 0.3s, filter 0.3s;
            pointer-events: none;
        }

        .form-group:focus-within .field-icon {
            opacity: 1;
            filter: drop-shadow(0 0 4px #FFD700);
        }

        .login-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.45), transparent);
            transform: scaleX(0);
            animation: divExpand 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
            transform-origin: center;
        }

        @keyframes divExpand {
            to { transform: scaleX(1); }
        }
        
        .user-info {
            margin-top: 15px;
            font-size: 14px;
            color: #FFD700;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .status-success {
            background: rgba(0, 255, 0, 0.2);
            color: #90EE90;
        }
        
        .status-error {
            background: rgba(255, 0, 0, 0.2);
            color: #FFB6C1;
        }
        
        .status-loading {
            background: rgba(255, 255, 0, 0.2);
            color: #FFD700;
        }
