<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Conocimiento — BB Analytics 360</title>
<link rel="icon" type="image/png" href="./icon_crystal.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --navy: #0f1e4a;
    --navy2: #152c6e;
    --blue: #1a3a8f;
    --gold: #FFD700;
    --gold2: #FF8C00;
    --cyan: #229ED9;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.88);
    --text-muted: rgba(255,255,255,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%); min-height: 100vh; color: var(--text); }

  /* ── LOGIN ── */
  #loginScreen {
    position: fixed; inset: 0; background: linear-gradient(135deg, #0f1e4a 0%, #152c6e 100%);
    display: flex; align-items: center; justify-content: center; z-index: 100; overflow: hidden;
  }
  #loginScreen canvas { position: absolute; inset: 0; pointer-events: none; }
  .login-box {
    position: relative; z-index: 1; background: rgba(255,255,255,0.07); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 380px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: boxIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes boxIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  .login-box img { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 14px; }
  .login-box h1 { font-size: 1.5em; font-weight: 700; margin-bottom: 4px; }
  .login-box h1 span { color: var(--gold); }
  .login-box .subtitle { color: var(--text-muted); font-size: 0.82em; margin-bottom: 28px; }
  .form-group { text-align: left; margin-bottom: 16px; position: relative; }
  .form-group label { display: block; font-size: 0.82em; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-group svg.fi { position: absolute; left: 13px; bottom: 13px; width: 18px; height: 18px; opacity: 0.4; transition: opacity 0.3s, filter 0.3s; pointer-events: none; }
  .form-group:focus-within svg.fi { opacity: 1; filter: drop-shadow(0 0 4px var(--gold)); }
  .form-group input { width: 100%; padding: 12px 14px 12px 40px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; font-size: 0.95em; font-family: inherit; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
  .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
  .form-group input::placeholder { color: rgba(255,255,255,0.3); }
  .login-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,0.4), transparent); margin: 20px 0 16px; transform: scaleX(0); animation: divIn 0.7s 0.3s forwards; }
  @keyframes divIn { to { transform: scaleX(1); } }
  .btn-login { width: 100%; padding: 13px; background: linear-gradient(145deg, var(--gold), var(--gold2)); border: none; border-radius: 50px; color: var(--navy2); font-weight: 700; font-size: 1em; cursor: pointer; font-family: inherit; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(255,140,0,0.4); position: relative; overflow: hidden; }
  .btn-login::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent); transform:skewX(-20deg); animation: shimmer 3s 1s infinite; }
  @keyframes shimmer { 0%{left:-100%} 40%,100%{left:150%} }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,140,0,0.5); }
  #loginError { font-size: 0.82em; color: #fca5a5; margin-top: 10px; min-height: 18px; }

  /* ── MAIN ── */
  #mainApp { display: none; min-height: 100vh; }

  /* Header */
  .app-header { background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); }
  .app-header img { width: 40px; height: 40px; border-radius: 50%; }
  .app-header h1 { font-size: 1.15em; font-weight: 700; }
  .app-header h1 span { color: var(--gold); }
  .app-header .badge { background: rgba(255,215,0,0.15); color: var(--gold); font-size: 0.75em; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.25); }
  .app-header .user-info { margin-left: auto; color: var(--text-muted); font-size: 0.82em; }
  .app-header .btn-logout { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82em; font-family: inherit; transition: all 0.2s; }
  .app-header .btn-logout:hover { background: rgba(255,100,100,0.15); border-color: rgba(255,100,100,0.3); color: #fca5a5; }

  /* Content */
  .content { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .content h2 { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; }
  .content .desc { color: var(--text-muted); font-size: 0.88em; margin-bottom: 28px; }

  /* Stats */
  .stats-row { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .stat-card .num { font-size: 1.8em; font-weight: 700; color: var(--gold); }
  .stat-card .lbl { font-size: 0.78em; color: var(--text-muted); margin-top: 2px; }

  /* Form */
  .form-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 14px; padding: 24px; margin-bottom: 28px; }
  .form-card h3 { font-size: 0.95em; font-weight: 600; margin-bottom: 18px; color: var(--gold); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 0.78em; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 13px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: white; font-size: 0.88em; font-family: inherit; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .field textarea { height: 80px; resize: vertical; }
  .field select option { background: var(--navy2); }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.12); }
  .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.25); }
  .btn-save { padding: 11px 28px; background: linear-gradient(145deg, var(--gold), var(--gold2)); border: none; border-radius: 8px; color: var(--navy2); font-weight: 700; font-size: 0.9em; cursor: pointer; font-family: inherit; transition: transform 0.2s; }
  .btn-save:hover { transform: translateY(-1px); }
  #saveStatus { font-size: 0.82em; margin-left: 12px; }

  /* Filters */
  .filters { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 16px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; color: var(--text-muted); font-size: 0.8em; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.35); color: var(--gold); }

  /* Cases list */
  #casesList { display: flex; flex-direction: column; gap: 12px; }
  .case-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 18px; transition: border-color 0.2s; }
  .case-card:hover { border-color: rgba(255,215,0,0.25); }
  .case-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .case-area { font-size: 0.72em; font-weight: 700; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; margin-top: 2px; }
  .area-Accesos  { background: rgba(34,158,217,0.2); color: #60c8f5; border: 1px solid rgba(34,158,217,0.3); }
  .area-Tecnico  { background: rgba(61,214,140,0.2); color: #6ee7b7; border: 1px solid rgba(61,214,140,0.3); }
  .area-Datos    { background: rgba(180,127,255,0.2); color: #c4a8ff; border: 1px solid rgba(180,127,255,0.3); }
  .area-General  { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
  .case-problema { font-weight: 600; font-size: 0.92em; flex: 1; }
  .case-solucion { color: var(--text-muted); font-size: 0.84em; line-height: 1.6; margin-bottom: 10px; }
  .case-keywords { display: flex; flex-wrap: wrap; gap: 6px; }
  .kw-tag { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 2px 8px; font-size: 0.72em; color: var(--text-muted); }
  .case-footer { display: flex; justify-content: flex-end; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
  .btn-delete { background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.2); color: #fca5a5; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78em; font-family: inherit; transition: all 0.2s; }
  .btn-delete:hover { background: rgba(255,100,100,0.2); }
  .btn-edit { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.2); color: var(--gold); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78em; font-family: inherit; transition: all 0.2s; margin-right: 8px; }
  .btn-edit:hover { background: rgba(255,215,0,0.2); }

  /* Modal edición */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: #1a2d6e; border: 1px solid var(--glass-border); border-radius: 16px; padding: 28px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
  .modal-box h3 { color: var(--gold); font-size: 1em; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel { padding: 10px 20px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-family: inherit; font-size: 0.88em; }
  .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 0.9em; }

  @media(max-width:600px) {
    .form-grid { grid-template-columns: 1fr; }
    .app-header h1 { font-size: 0.95em; }
    .content { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <canvas id="loginCanvas"></canvas>
  <div class="login-box">
    <img src="./icon_crystal.png" alt="BB Analytics 360">
    <h1>BB <span>Analytics 360</span></h1>
    <p class="subtitle">Base de Conocimiento — Acceso restringido</p>
    <div class="form-group">
      <label>Usuario</label>
      <svg class="fi" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <input type="email" id="loginUser" placeholder="usuario@bigbola.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <svg class="fi" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-divider"></div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <header class="app-header">
    <img src="./icon_crystal.png" alt="">
    <h1>BB <span>Analytics 360</span></h1>
    <span class="badge">Base de Conocimiento</span>
    <span class="user-info" id="headerUser"></span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <div class="content">
    <h2>Gestión de Casos</h2>
    <p class="desc">Administra los problemas y soluciones que el asistente IA consultará al responder a los usuarios.</p>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Casos totales</div></div>
      <div class="stat-card"><div class="num" id="statAccesos">0</div><div class="lbl">Accesos</div></div>
      <div class="stat-card"><div class="num" id="statTecnico">0</div><div class="lbl">Técnico</div></div>
      <div class="stat-card"><div class="num" id="statDatos">0</div><div class="lbl">Datos</div></div>
    </div>

    <!-- Form -->
    <div class="form-card">
      <h3>➕ Nuevo caso</h3>
      <div class="form-grid">
        <div class="field full">
          <label>Problema</label>
          <input id="kbProblema" type="text" placeholder="Describe el problema que reportó el usuario...">
        </div>
        <div class="field full">
          <label>Solución</label>
          <textarea id="kbSolucion" placeholder="Describe paso a paso cómo se resolvió..."></textarea>
        </div>
        <div class="field">
          <label>Palabras clave (separadas por coma)</label>
          <input id="kbKeywords" type="text" placeholder="Ej: no carga, blanco, dashboard, acceso">
        </div>
        <div class="field">
          <label>Área</label>
          <select id="kbArea">
            <option value="Accesos">Accesos</option>
            <option value="Técnico">Técnico</option>
            <option value="Datos">Datos</option>
            <option value="General">General</option>
          </select>
        </div>
      </div>
      <div style="margin-top:16px;display:flex;align-items:center;">
        <button class="btn-save" onclick="addCase()">Guardar caso</button>
        <span id="saveStatus"></span>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterCases('all',this)">Todos</button>
      <button class="filter-btn" onclick="filterCases('Accesos',this)">Accesos</button>
      <button class="filter-btn" onclick="filterCases('Técnico',this)">Técnico</button>
      <button class="filter-btn" onclick="filterCases('Datos',this)">Datos</button>
      <button class="filter-btn" onclick="filterCases('General',this)">General</button>
    </div>

    <!-- List -->
    <div id="casesList"><div class="empty-state">Cargando casos...</div></div>
  </div>
</div>
